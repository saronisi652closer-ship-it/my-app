<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ポケモンメニュー</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: sans-serif;
      background: #172554;
      color: #fff;
    }
    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #bfdbfe;
      text-decoration: none;
    }
    .menu {
      display: grid;
      gap: 14px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: #fff;
      background: #1d4ed8;
      border-radius: 16px;
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .card p {
      margin: 0;
      color: #dbeafe;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">← ホームへ戻る</a>
    <h1>ポケモン</h1>

    <div class="menu">
      <a class="card" href="./zukan/">
        <h2>ポケモン図鑑</h2>
        <p>ポケモン情報を検索・確認</p>
      </a>

      <a class="card" href="./party-manager/">
        <h2>パーティ管理</h2>
        <p>手持ちや育成候補を管理</p>
      </a>
    </div>
  </div>
</body>
</html>
