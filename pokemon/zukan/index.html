<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ポケモン図鑑</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0c4a6e;
      color: #fff;
      padding: 24px 16px 48px;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }
    a {
      color: #dbeafe;
      text-decoration: none;
    }
    .box {
      margin-top: 18px;
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }
    .note {
      color: #e0f2fe;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="../">← ポケモンメニューへ戻る</a></p>
    <h1>ポケモン図鑑</h1>

    <div class="box">
      <label for="search">ポケモン名検索（仮）</label>
      <input id="search" type="text" placeholder="ポケモン名を入れる">
      <p class="note">今は見た目の土台だけです。あとから図鑑データや画像を追加できます。</p>
    </div>
  </div>
</body>
</html>
