<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ポケモン補完データ管理</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <header>
    <div class="wrap">
      <h1>ポケモン補完データ管理</h1>
      <div class="small">APIで足りない情報を追加・編集できます</div>
    </div>
  </header>

  <main class="wrap">
    <a class="back" href="../">← ポケモンへ戻る</a>

    <div class="grid">
      <section class="card">
        <h2 id="editorTitle">新規登録</h2>

        <div class="two">
          <div>
            <div class="label">ポケモン名</div>
            <input id="pokemonName" type="text" placeholder="例：ピカチュウ">
          </div>
          <div>
            <div class="label">全国図鑑番号</div>
            <input id="nationalDex" type="text" placeholder="例：25">
          </div>
        </div>

        <div style="margin-top:10px;">
          <div class="label">地方図鑑番号（カンマ区切り）</div>
          <input id="localDex" type="text" placeholder="例：カントー:25, ジョウト:22, パルデア:74">
        </div>

        <div style="margin-top:10px;">
          <div class="label">作品別データ（カンマ区切り）</div>
          <input id="gameData" type="text" placeholder="例：HGSS:りゅうのあな, SV:南1番エリア">
        </div>

        <div style="margin-top:10px;">
          <div class="label">補足メモ</div>
          <textarea id="memo" placeholder="例：この作品では進化入手のみ / フォルム違いあり"></textarea>
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="primary" id="saveBtn" type="button">保存</button>
          <button id="clearBtn" type="button">入力クリア</button>
          <button class="danger" id="deleteBtn" type="button" style="display:none;">削除</button>
        </div>

        <div class="small" id="status" style="margin-top:10px;"></div>
      </section>

      <section class="card">
        <h2>保存済み補完データ</h2>

        <div class="two" style="margin-bottom:12px;">
          <div>
            <div class="label">検索</div>
            <input id="searchBox" type="text" placeholder="ポケモン名・作品・メモ検索">
          </div>
          <div>
            <div class="label">件数</div>
            <div class="small" id="countText">0件</div>
          </div>
        </div>

        <div id="dataList" class="menu"></div>
        <div id="emptyMessage" class="small">まだ補完データがありません。</div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = "pokemon_custom_data_v1";

      const $ = (id) => document.getElementById(id);

      const editorTitle = $("editorTitle");
      const pokemonName = $("pokemonName");
      const nationalDex = $("nationalDex");
      const localDex = $("localDex");
      const gameData = $("gameData");
      const memo = $("memo");

      const saveBtn = $("saveBtn");
      const clearBtn = $("clearBtn");
      const deleteBtn = $("deleteBtn");
      const status = $("status");

      const searchBox = $("searchBox");
      const countText = $("countText");
      const dataList = $("dataList");
      const emptyMessage = $("emptyMessage");

      let records = loadRecords();
      let editingId = null;

      function loadRecords() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveRecords() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function setStatus(message) {
        status.textContent = message;
        if (message) {
          setTimeout(() => {
            if (status.textContent === message) status.textContent = "";
          }, 2500);
        }
      }

      function createId() {
        return "custom_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      }

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function parsePairs(text) {
        return text
          .split(",")
          .map(item => item.trim())
          .filter(Boolean)
          .map(item => {
            const parts = item.split(":");
            return {
              key: (parts[0] || "").trim(),
              value: parts.slice(1).join(":").trim()
            };
          })
          .filter(item => item.key && item.value);
      }

      function pairsToText(pairs) {
        return (pairs || [])
          .map(item => `${item.key}:${item.value}`)
          .join(", ");
      }

      function getFormData() {
        return {
          id: editingId || createId(),
          name: pokemonName.value.trim(),
          nationalDex: nationalDex.value.trim(),
          localDex: parsePairs(localDex.value),
          gameData: parsePairs(gameData.value),
          memo: memo.value.trim(),
          updatedAt: new Date().toISOString()
        };
      }

      function clearForm() {
        editingId = null;
        editorTitle.textContent = "新規登録";
        pokemonName.value = "";
        nationalDex.value = "";
        localDex.value = "";
        gameData.value = "";
        memo.value = "";
        deleteBtn.style.display = "none";
      }

      function fillForm(record) {
        editingId = record.id;
        editorTitle.textContent = "編集中：" + (record.name || "無名データ");
        pokemonName.value = record.name || "";
        nationalDex.value = record.nationalDex || "";
        localDex.value = pairsToText(record.localDex || []);
        gameData.value = pairsToText(record.gameData || []);
        memo.value = record.memo || "";
        deleteBtn.style.display = "inline-block";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function saveCurrent() {
        const data = getFormData();

        if (!data.name) {
          setStatus("ポケモン名を入れてください");
          return;
        }

        const existingIndex = records.findIndex(r => r.id === data.id);

        if (existingIndex >= 0) {
          data.createdAt = records[existingIndex].createdAt || data.updatedAt;
          records[existingIndex] = data;
          setStatus("更新しました");
        } else {
          data.createdAt = data.updatedAt;
          records.unshift(data);
          setStatus("保存しました");
        }

        saveRecords();
        renderList();
        fillForm(data);
      }

      function deleteCurrent() {
        if (!editingId) return;

        const target = records.find(r => r.id === editingId);
        if (!target) return;

        const ok = confirm(`「${target.name || "このデータ"}」を削除しますか？`);
        if (!ok) return;

        records = records.filter(r => r.id !== editingId);
        saveRecords();
        clearForm();
        renderList();
        setStatus("削除しました");
      }

      function getFilteredRecords() {
        const keyword = searchBox.value.trim().toLowerCase();
        let result = [...records];

        if (keyword) {
          result = result.filter(r => {
            const text = [
              r.name,
              r.nationalDex,
              ...(r.localDex || []).map(x => `${x.key} ${x.value}`),
              ...(r.gameData || []).map(x => `${x.key} ${x.value}`),
              r.memo
            ].join(" ").toLowerCase();

            return text.includes(keyword);
          });
        }

        result.sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
        return result;
      }

      function renderList() {
        const items = getFilteredRecords();
        dataList.innerHTML = "";
        emptyMessage.style.display = items.length ? "none" : "block";
        countText.textContent = `${items.length}件`;

        items.forEach((record) => {
          const card = document.createElement("div");
          card.className = "menu-card";

          const localDexHtml = (record.localDex || []).length
            ? `<div class="small" style="margin-top:8px;">地方図鑑：${escapeHtml((record.localDex || []).map(x => `${x.key}:${x.value}`).join(" / "))}</div>`
            : "";

          const gameDataHtml = (record.gameData || []).length
            ? `<div class="small" style="margin-top:8px;">作品別：${escapeHtml((record.gameData || []).map(x => `${x.key}:${x.value}`).join(" / "))}</div>`
            : "";

          const memoHtml = record.memo
            ? `<div class="small" style="margin-top:8px; white-space:pre-wrap;">${escapeHtml(record.memo)}</div>`
            : "";

          card.innerHTML = `
            <h2>${escapeHtml(record.name || "無名データ")}</h2>
            <div class="small">全国図鑑：${escapeHtml(record.nationalDex || "未設定")}</div>
            ${localDexHtml}
            ${gameDataHtml}
            ${memoHtml}
            <div class="row" style="margin-top:12px;">
              <button type="button" data-action="edit" data-id="${escapeHtml(record.id)}">編集</button>
              <button type="button" class="danger" data-action="delete" data-id="${escapeHtml(record.id)}">削除</button>
            </div>
          `;

          dataList.appendChild(card);
        });

        dataList.querySelectorAll("button[data-action='edit']").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.dataset.id;
            const target = records.find(r => r.id === id);
            if (target) fillForm(target);
          });
        });

        dataList.querySelectorAll("button[data-action='delete']").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.dataset.id;
            const target = records.find(r => r.id === id);
            if (!target) return;

            const ok = confirm(`「${target.name || "このデータ"}」を削除しますか？`);
            if (!ok) return;

            records = records.filter(r => r.id !== id);
            saveRecords();

            if (editingId === id) clearForm();

            renderList();
            setStatus("削除しました");
          });
        });
      }

      saveBtn.addEventListener("click", saveCurrent);
      clearBtn.addEventListener("click", () => {
        clearForm();
        setStatus("入力をクリアしました");
      });
      deleteBtn.addEventListener("click", deleteCurrent);
      searchBox.addEventListener("input", renderList);

      clearForm();
      renderList();
    })();
  </script>
</body>
</html>
