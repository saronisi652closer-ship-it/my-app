<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ポケモン図鑑</title>
  <style>
    :root {
      --bg: #0a0c12;
      --card: #0f1219;
      --line: #1e2435;
      --accent: #6c8cff;
      --accent2: #ff6b9d;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #4ade80;
      --warning: #facc15;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px; }

    header { border-bottom: 1px solid var(--line); padding: 18px 0; }
    header h1 { font-size: 20px; font-weight: 700; }
    header .small { color: var(--muted); font-size: 12px; margin-top: 2px; }

    main { padding: 20px 0 60px; }
    .back { color: var(--accent); text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 16px; }

    .grid { display: grid; gap: 16px; }
    @media(min-width: 800px) { .grid { grid-template-columns: 340px 1fr; } }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
    h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }

    input, select {
      width: 100%; background: #0a0c14; border: 1px solid var(--line);
      border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 14px;
      outline: none; transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--line); background: #1a1e2e; color: var(--text);
      transition: all .15s;
    }
    button:hover { background: #232840; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: #5a7aee; }
    button.secondary { background: transparent; border-color: var(--accent); color: var(--accent); }
    button.secondary:hover { background: rgba(108,140,255,.1); }

    .result-card { display: none; }
    .result-card.show { display: block; }
    .error-box { color: #fda4af; margin-top: 10px; font-size: 13px; }
    .loading { color: var(--muted); margin-top: 10px; font-size: 13px; }
    .section-gap { margin-top: 14px; }
    .preline { white-space: pre-wrap; }

    .result-card img { width: 180px; max-width: 100%; display: block; margin: 0 auto 14px; }
    .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    @media(min-width:700px){ .stat-grid { grid-template-columns: repeat(3,1fr); } }
    .mini-card { background: #10131b; border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
    .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .badge {
      display: inline-block; padding: 5px 10px; border: 1px solid var(--line);
      border-radius: 999px; font-size: 12px; background: #0f1117;
    }

    /* ── Advanced Search Panel ── */
    #advPanel { display: none; margin-top: 14px; }
    #advPanel.open { display: block; }
    .adv-toggle {
      width: 100%; text-align: left; background: transparent; border: 1px dashed var(--line);
      color: var(--muted); font-size: 13px; padding: 8px 12px; border-radius: 8px;
      cursor: pointer; transition: all .2s; margin-top: 12px;
    }
    .adv-toggle:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,.05); }
    .adv-toggle.active { border-color: var(--accent); color: var(--accent); }

    .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .stat-filter-item label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
    .stat-filter-item input { padding: 7px 10px; font-size: 13px; }

    /* ── Search Results List ── */
    #searchResultsCard { display: none; }
    #searchResultsCard.show { display: block; }
    .results-list { max-height: 460px; overflow-y: auto; margin-top: 10px; }
    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-track { background: transparent; }
    .results-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    .poke-result-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      border-radius: 10px; cursor: pointer; transition: background .15s;
      border-bottom: 1px solid var(--line);
    }
    .poke-result-item:last-child { border-bottom: none; }
    .poke-result-item:hover { background: rgba(108,140,255,.08); }
    .poke-result-item img { width: 48px; height: 48px; object-fit: contain; }
    .poke-result-item .poke-no { font-size: 11px; color: var(--muted); min-width: 36px; }
    .poke-result-item .poke-name { font-size: 14px; font-weight: 600; }
    .poke-result-item .poke-types { display: flex; gap: 4px; flex-wrap: wrap; }
    /* Evolution chain */
    .evo-chain { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
    .evo-btn {
      background: #0f1117; border: 1px solid var(--line); border-radius: 999px;
      color: var(--accent); font-size: 13px; font-weight: 600; padding: 5px 12px;
      cursor: pointer; transition: all .15s;
    }
    .evo-btn:hover { background: rgba(108,140,255,.12); border-color: var(--accent); }
    .evo-btn.current { background: rgba(108,140,255,.18); border-color: var(--accent); color: #fff; cursor: default; }
    .evo-arrow { color: var(--muted); font-size: 14px; }

    .poke-result-item .type-chip {
      font-size: 10px; padding: 2px 7px; border-radius: 999px;
      border: 1px solid var(--line); background: #0f1117;
    }
    .results-count { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .results-loading { color: var(--muted); font-size: 13px; padding: 12px 0; text-align: center; }

    .pager { display: flex; align-items: center; gap: 8px; margin-top: 10px; justify-content: center; }
    .pager button { padding: 6px 12px; font-size: 12px; }
    .pager .page-info { font-size: 12px; color: var(--muted); }

    /* Type color chips */
    .type-normal   { border-color: #a8a878 !important; color: #a8a878; }
    .type-fire     { border-color: #f08030 !important; color: #f08030; }
    .type-water    { border-color: #6890f0 !important; color: #6890f0; }
    .type-electric { border-color: #f8d030 !important; color: #f8d030; }
    .type-grass    { border-color: #78c850 !important; color: #78c850; }
    .type-ice      { border-color: #98d8d8 !important; color: #98d8d8; }
    .type-fighting { border-color: #c03028 !important; color: #c03028; }
    .type-poison   { border-color: #a040a0 !important; color: #a040a0; }
    .type-ground   { border-color: #e0c068 !important; color: #e0c068; }
    .type-flying   { border-color: #a890f0 !important; color: #a890f0; }
    .type-psychic  { border-color: #f85888 !important; color: #f85888; }
    .type-bug      { border-color: #a8b820 !important; color: #a8b820; }
    .type-rock     { border-color: #b8a038 !important; color: #b8a038; }
    .type-ghost    { border-color: #705898 !important; color: #705898; }
    .type-dragon   { border-color: #7038f8 !important; color: #7038f8; }
    .type-dark     { border-color: #705848 !important; color: #705848; }
    .type-steel    { border-color: #b8b8d0 !important; color: #b8b8d0; }
    .type-fairy    { border-color: #ee99ac !important; color: #ee99ac; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>ポケモン図鑑</h1>
      <div class="small">API + 補完データ連携版</div>
    </div>
  </header>

  <main class="wrap">
    <a class="back" href="../">← ポケモンへ戻る</a>

    <div class="grid">
      <!-- ── Left Column: Search Controls ── -->
      <div style="display:flex;flex-direction:column;gap:16px;">

        <!-- Basic Search Card -->
        <section class="card">
          <h2>名前 / 図鑑番号で検索</h2>
          <div class="label">ポケモン名 / 全国図鑑番号</div>
          <input id="searchInput" type="text" placeholder="例：pikachu / ピカチュウ / 25">
          <div class="row" style="margin-top:12px;">
            <button class="primary" id="searchBtn" type="button">検索</button>
            <button id="clearBtn" type="button">クリア</button>
          </div>
          <div class="loading" id="loadingText"></div>
          <div class="error-box" id="errorText"></div>
        </section>

        <!-- Advanced Search Card -->
        <section class="card">
          <h2>詳細検索</h2>

          <div class="filter-grid">
            <div>
              <div class="label">タイプ１</div>
              <select id="typeFilter1">
                <option value="">-- 指定なし --</option>
                <option value="normal">ノーマル</option>
                <option value="fire">ほのお</option>
                <option value="water">みず</option>
                <option value="electric">でんき</option>
                <option value="grass">くさ</option>
                <option value="ice">こおり</option>
                <option value="fighting">かくとう</option>
                <option value="poison">どく</option>
                <option value="ground">じめん</option>
                <option value="flying">ひこう</option>
                <option value="psychic">エスパー</option>
                <option value="bug">むし</option>
                <option value="rock">いわ</option>
                <option value="ghost">ゴースト</option>
                <option value="dragon">ドラゴン</option>
                <option value="dark">あく</option>
                <option value="steel">はがね</option>
                <option value="fairy">フェアリー</option>
              </select>
            </div>
            <div>
              <div class="label">タイプ２</div>
              <select id="typeFilter2">
                <option value="">-- 指定なし --</option>
                <option value="normal">ノーマル</option>
                <option value="fire">ほのお</option>
                <option value="water">みず</option>
                <option value="electric">でんき</option>
                <option value="grass">くさ</option>
                <option value="ice">こおり</option>
                <option value="fighting">かくとう</option>
                <option value="poison">どく</option>
                <option value="ground">じめん</option>
                <option value="flying">ひこう</option>
                <option value="psychic">エスパー</option>
                <option value="bug">むし</option>
                <option value="rock">いわ</option>
                <option value="ghost">ゴースト</option>
                <option value="dragon">ドラゴン</option>
                <option value="dark">あく</option>
                <option value="steel">はがね</option>
                <option value="fairy">フェアリー</option>
              </select>
            </div>
          </div>

          <div style="margin-top:12px;">
            <div class="label">世代</div>
            <select id="genFilter">
              <option value="">-- 指定なし --</option>
              <option value="1">第1世代（カントー）</option>
              <option value="2">第2世代（ジョウト）</option>
              <option value="3">第3世代（ホウエン）</option>
              <option value="4">第4世代（シンオウ）</option>
              <option value="5">第5世代（イッシュ）</option>
              <option value="6">第6世代（カロス）</option>
              <option value="7">第7世代（アローラ）</option>
              <option value="8">第8世代（ガラル）</option>
              <option value="9">第9世代（パルデア）</option>
            </select>
          </div>

          <!-- Stat Min Filters (collapsible) -->
          <button class="adv-toggle" id="statToggle" type="button">▸ 種族値フィルター</button>
          <div id="statPanel" style="display:none;">
            <div class="stat-filters">
              <div class="stat-filter-item">
                <label>HP 以上</label>
                <input type="number" id="minHp" placeholder="0" min="0" max="255">
              </div>
              <div class="stat-filter-item">
                <label>こうげき 以上</label>
                <input type="number" id="minAtk" placeholder="0" min="0" max="255">
              </div>
              <div class="stat-filter-item">
                <label>ぼうぎょ 以上</label>
                <input type="number" id="minDef" placeholder="0" min="0" max="255">
              </div>
              <div class="stat-filter-item">
                <label>とくこう 以上</label>
                <input type="number" id="minSpAtk" placeholder="0" min="0" max="255">
              </div>
              <div class="stat-filter-item">
                <label>とくぼう 以上</label>
                <input type="number" id="minSpDef" placeholder="0" min="0" max="255">
              </div>
              <div class="stat-filter-item">
                <label>すばやさ 以上</label>
                <input type="number" id="minSpeed" placeholder="0" min="0" max="255">
              </div>
              <div class="stat-filter-item" style="grid-column:1/-1;">
                <label>合計種族値 以上</label>
                <input type="number" id="minBst" placeholder="0" min="0" max="1125">
              </div>
            </div>
          </div>

          <div class="row" style="margin-top:14px;">
            <button class="primary" id="advSearchBtn" type="button">詳細検索を実行</button>
            <button id="advClearBtn" type="button">リセット</button>
          </div>
          <div class="loading" id="advLoadingText"></div>
          <div class="error-box" id="advErrorText"></div>
        </section>

        <div class="small" style="color:var(--muted);font-size:12px;padding:0 4px;">
          補完データ管理ページで入れた地方図鑑番号・作品別データ・補足メモも表示されます。
        </div>
      </div>

      <!-- ── Right Column: Results ── -->
      <div style="display:flex;flex-direction:column;gap:16px;">

        <!-- Search Results List -->
        <section class="card" id="searchResultsCard">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <h2 id="resultsTitle">検索結果</h2>
            <button id="resultsCloseBtn" type="button" style="padding:4px 10px;font-size:12px;">✕ 閉じる</button>
          </div>
          <div class="results-count" id="resultsCount"></div>
          <div class="results-list" id="resultsList"></div>
          <div class="pager" id="pager"></div>
        </section>

        <!-- Pokemon Detail Card -->
        <section class="card result-card" id="resultCard">
          <h2 id="pokeTitle">検索結果</h2>
          <img id="pokeImage" alt="pokemon image">
          <div class="small preline" id="pokeFlavor"></div>

          <div class="section-gap">
            <div class="label">タイプ</div>
            <div class="badge-list" id="typeList"></div>
          </div>
          <div class="section-gap">
            <div class="label">特性</div>
            <div class="badge-list" id="abilityList"></div>
          </div>
          <div class="section-gap">
            <div class="label">基本情報</div>
            <div class="stat-grid">
              <div class="mini-card"><strong>全国図鑑</strong><div id="nationalDex"></div></div>
              <div class="mini-card"><strong>高さ</strong><div id="heightText"></div></div>
              <div class="mini-card"><strong>重さ</strong><div id="weightText"></div></div>
            </div>
          </div>
          <div class="section-gap">
            <div class="label">種族値</div>
            <div class="stat-grid" id="baseStats"></div>
          </div>
          <div class="section-gap">
            <div class="label">地方図鑑番号</div>
            <div class="badge-list" id="localDexList"></div>
          </div>
          <div class="section-gap">
            <div class="label">進化系統</div>
            <div id="evolutionBox" class="small"></div>
          </div>
          <div class="section-gap">
            <div class="label">タイプ相性</div>
            <div style="margin-top:8px;"><div class="small">弱点</div><div class="badge-list" id="weaknessList"></div></div>
            <div style="margin-top:10px;"><div class="small">半減</div><div class="badge-list" id="resistList"></div></div>
            <div style="margin-top:10px;"><div class="small">無効</div><div class="badge-list" id="immuneList"></div></div>
          </div>
          <div class="section-gap">
            <div class="label">作品別データ</div>
            <div id="gameDataBox" class="small"></div>
          </div>
          <div class="section-gap">
            <div class="label">補足メモ</div>
            <button class="primary" id="addToPartyBtn" type="button">パーティ管理へ追加</button>
            <div class="small" id="partyAddStatus" style="margin-top:8px;"></div>
            <div id="customMemoBox" class="small preline" style="margin-top:8px;"></div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <script>
  (() => {
    const API_BASE = "https://pokeapi.co/api/v2";
    const CUSTOM_KEY = "pokemon_custom_data_v1";
    const PARTY_CANDIDATE_KEY = "pokemon_party_candidates_v1";

    const el = id => document.getElementById(id);

    // ── DOM refs ──
    const searchInput       = el("searchInput");
    const searchBtn         = el("searchBtn");
    const clearBtn          = el("clearBtn");
    const loadingText       = el("loadingText");
    const errorText         = el("errorText");
    const resultCard        = el("resultCard");

    // Advanced search
    const typeFilter1       = el("typeFilter1");
    const typeFilter2       = el("typeFilter2");
    const genFilter         = el("genFilter");
    const statToggle        = el("statToggle");
    const statPanel         = el("statPanel");

    // ── Constants ──

    const TYPE_JA = {
      normal:"ノーマル", fire:"ほのお", water:"みず", electric:"でんき", grass:"くさ",
      ice:"こおり", fighting:"かくとう", poison:"どく", ground:"じめん", flying:"ひこう",
      psychic:"エスパー", bug:"むし", rock:"いわ", ghost:"ゴースト", dragon:"ドラゴン",
      dark:"あく", steel:"はがね", fairy:"フェアリー"

    const TYPE_CHART = {
      normal:   { weak:["fighting"],                resist:[],                             immune:["ghost"] },
      fire:     { weak:["water","ground","rock"],    resist:["fire","grass","ice","bug","steel","fairy"], immune:[] },

      ground:   { weak:["water","grass","ice"],      resist:["poison","rock"],              immune:["electric"] },
      flying:   { weak:["electric","ice","rock"],    resist:["grass","fighting","bug"],    immune:["ground"] },

    const JA_TO_EN = {
      "フシギダネ":"bulbasaur","ヒトカゲ":"charmander","ゼニガメ":"squirtle",
      "ピカチュウ":"pikachu","イーブイ":"eevee","カビゴン":"snorlax",
      "ミュウツー":"mewtwo","カイリュー":"dragonite","バンギラス":"tyranitar",
      "サーナイト":"gardevoir","メタグロス":"metagross","ルカリオ":"lucario",
      "ガブリアス":"garchomp","ゲッコウガ":"greninja","ミミッキュ":"mimikyu",
      "ドラパルト":"dragapult","ニャオハ":"sprigatito","ホゲータ":"fuecoco",
      "クワッス":"quaxly","コライドン":"koraidon","ミライドン":"miraidon"
    };

    // ── Caches ──
    const fetchCache = {};
    const dexCache   = {};
    let   jaNameMap  = null;
    let   currentPokemonData = null;

    // ── Pagination state ──
    const PAGE_SIZE = 20;
    let advResults  = [];
    let currentPage = 1;

    // ── Utilities ──
    function escapeHtml(t) {
      return String(t ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    async function cachedFetchJson(url) {
      if (fetchCache[url]) return fetchCache[url];
      const res = await fetch(url);
      if (!res.ok) throw new Error("fetch_failed: " + url);
      const data = await res.json();
      fetchCache[url] = data;
      return data;
    }

    async function buildJaNameMap() {
      if (jaNameMap) return jaNameMap;
      jaNameMap = {};
      const listData = await cachedFetchJson(`${API_BASE}/pokemon-species?limit=2000`);
      for (const item of listData.results || []) {
        try {
          const s = await cachedFetchJson(item.url);
          const ja = s.names?.find(n => n.language.name === "ja-Hrkt")?.name
                  || s.names?.find(n => n.language.name === "ja")?.name;
          if (ja) jaNameMap[ja] = s.name;
        } catch (_) {}
      }
      return jaNameMap;
    }

    async function normalizeQuery(value) {
      const raw = value.trim();
      if (!raw) return "";
      if (/^\d+$/.test(raw)) return raw;
      if (JA_TO_EN[raw]) return JA_TO_EN[raw];
      const map = await buildJaNameMap();
      if (map[raw]) return map[raw];
      return raw.toLowerCase().replaceAll("♀","-f").replaceAll("♂","-m")
                .replaceAll("　"," ").replaceAll(" ","-");
    }

    function loadCustomData() {
      try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || "[]"); }
      catch { return []; }
    }

    function findCustomRecord(nameJa, nationalNo) {
      return loadCustomData().find(r =>
        (r.name||"").trim() === (nameJa||"").trim() ||
        String(r.nationalDex||"").trim() === String(nationalNo||"").trim()
      ) || null;
    }

    function getJapaneseName(species) {
      return species.names?.find(n => n.language.name === "ja-Hrkt")?.name
          || species.names?.find(n => n.language.name === "ja")?.name
          || species.name;
    }

    function getJapaneseFlavor(species) {
      const e = (species.flavor_text_entries||[]).find(x=>x.language?.name==="ja-Hrkt")
             || (species.flavor_text_entries||[]).find(x=>x.language?.name==="ja");
      return e ? e.flavor_text.replace(/\f|\n|\r/g," ") : "";
    }

    function renderBadgeList(container, texts) {
      container.innerHTML = "";
      const list = texts.length ? texts : ["データなし"];
      list.forEach(t => {
        const s = document.createElement("span");
        s.className = "badge";
        s.textContent = t;
        container.appendChild(s);
      });
    }

    function renderTypes(types) {
      renderBadgeList(typeList,
        types.sort((a,b)=>a.slot-b.slot).map(t=>TYPE_JA[t.type.name]||t.type.name)
      );
    }

    async function renderAbilities(abilities) {
      abilityList.innerHTML = "";
      for (const a of abilities.sort((a,b)=>a.slot-b.slot)) {
        let name = a.ability.name;
        try {
          const d = await cachedFetchJson(a.ability.url);
          const ja = d.names.find(n=>n.language.name==="ja"||n.language.name==="ja-Hrkt");
          if (ja) name = ja.name;
        } catch(_) {}
        const s = document.createElement("span");
        s.className = "badge";
        s.textContent = a.is_hidden ? `${name}（隠れ特性）` : name;
        abilityList.appendChild(s);
      }
    }

    function renderStats(stats) {
      baseStats.innerHTML = "";
      stats.forEach(s => {
        const box = document.createElement("div");
        box.className = "mini-card";
        box.innerHTML = `<strong>${escapeHtml(STAT_JA[s.stat.name]||s.stat.name)}</strong><div>${s.base_stat}</div>`;
        baseStats.appendChild(box);
      });
    }

    function calculateTypeEffectiveness(typeNames) {
      return Object.keys(TYPE_CHART).map(atk => {
        let m = 1;
        for (const def of typeNames) {
          const c = TYPE_CHART[def]; if (!c) continue;
          if (c.immune.includes(atk)) m *= 0;
          else if (c.weak.includes(atk)) m *= 2;
          else if (c.resist.includes(atk)) m *= 0.5;
        }
        return { type: atk, multiplier: m };
      });
    }

    function renderTypeEffectiveness(typeNames) {
      const data = calculateTypeEffectiveness(typeNames);
      renderBadgeList(weaknessList, data.filter(x=>x.multiplier>1).map(x=>`${TYPE_JA[x.type]||x.type} x${x.multiplier}`));
      renderBadgeList(resistList,   data.filter(x=>x.multiplier>0&&x.multiplier<1).map(x=>`${TYPE_JA[x.type]||x.type} x${x.multiplier}`));
      renderBadgeList(immuneList,   data.filter(x=>x.multiplier===0).map(x=>TYPE_JA[x.type]||x.type));
    }

    async function fetchPokedexEntry(key, speciesName) {
      if (!dexCache[key]) dexCache[key] = cachedFetchJson(`${API_BASE}/pokedex/${key}`);
      const d = await dexCache[key];
      const e = (d.pokemon_entries||[]).find(e=>e.pokemon_species?.name===speciesName);
      return e ? e.entry_number : null;
    }

    async function getLocalDexNumbers(speciesName) {
      const results = [];
      for (const dex of POKEDEXES) {
        try {
          const num = await fetchPokedexEntry(dex.key, speciesName);
          if (num !== null) results.push({ label: dex.label, number: num, source: "api" });
        } catch (_) {}
      }
      return results;
    }

    function mergeLocalDex(apiEntries, customRecord) {
      const merged = [...apiEntries];
      const existing = new Set(apiEntries.map(x=>x.label));
      (customRecord?.localDex||[]).forEach(item => {
        if (!existing.has(item.key)) merged.push({ label:item.key, number:item.value, source:"custom" });
      });
      return merged;
    }

    function renderLocalDex(entries) {
      localDexList.innerHTML = "";
      if (!entries.length) {
        const s = document.createElement("span"); s.className="badge"; s.textContent="地方図鑑番号なし / 未取得";
        localDexList.appendChild(s); return;
      }
      entries.forEach(e => {
        const s = document.createElement("span"); s.className="badge";
        s.textContent = e.source==="custom" ? `${e.label}: ${e.number}（補完）` : `${e.label}: ${e.number}`;
        localDexList.appendChild(s);
      });
    }

    async function fetchEvolutionNames(species) {
      if (!species.evolution_chain?.url) return [];
      const chain = await cachedFetchJson(species.evolution_chain.url);
      const enNames = [];
      function walk(node) {
        if (!node) return;
        if (node.species?.name) enNames.push(node.species.name);
        (node.evolves_to||[]).forEach(walk);
      }
      walk(chain.chain);
      const result = [];
      for (const en of enNames) {
        try {
          const s = await cachedFetchJson(`${API_BASE}/pokemon-species/${en}`);
          const ja = s.names?.find(n=>n.language.name==="ja-Hrkt")?.name
                  || s.names?.find(n=>n.language.name==="ja")?.name || en;
          result.push({ ja, en });
        } catch(_) { result.push({ ja: en, en }); }
      }
      return result;
    }

    function renderGameData(cr) {
      const list = cr?.gameData || [];
      gameDataBox.innerHTML = list.length
        ? list.map(i=>`<div style="margin-top:6px;"><strong>${escapeHtml(i.key)}</strong>：${escapeHtml(i.value)}</div>`).join("")
        : "補完データなし";
    }

    function renderCustomMemo(cr) { customMemoBox.textContent = cr?.memo || "補完メモなし"; }

    function savePartyCandidate(data) {
      try {
        const raw = localStorage.getItem(PARTY_CANDIDATE_KEY);
        const list = raw ? JSON.parse(raw) : [];
        list.unshift({ id:"candidate_"+Date.now(), ...data, addedAt: new Date().toISOString() });
        localStorage.setItem(PARTY_CANDIDATE_KEY, JSON.stringify(list));
        partyAddStatus.textContent = "パーティ候補に追加しました";
        setTimeout(() => { partyAddStatus.textContent = ""; }, 2500);
      } catch(_) { partyAddStatus.textContent = "保存に失敗しました"; }
    }

    // ── Main Pokémon Loader ──
    async function fetchPokemon(query) {
      const pokemon  = await cachedFetchJson(`${API_BASE}/pokemon/${query}`);
      const species  = await cachedFetchJson(pokemon.species.url);
      return { pokemon, species };
    }

    async function loadPokemonDetail(query) {
      errorText.textContent = "";
      loadingText.textContent = "取得中...";
      resultCard.classList.remove("show");
      try {
        const { pokemon, species } = await fetchPokemon(query);
        const nameJa       = getJapaneseName(species);
        const customRecord = findCustomRecord(nameJa, species.id);
        const apiLocalDex  = await getLocalDexNumbers(species.name);
        const mergedDex    = mergeLocalDex(apiLocalDex, customRecord);
        const evoNames     = await fetchEvolutionNames(species);

        pokeTitle.textContent = `No.${species.id} ${nameJa}`;
        pokeImage.src = pokemon.sprites?.other?.["official-artwork"]?.front_default
                     || pokemon.sprites?.front_default || "";
        pokeImage.alt = pokeTitle.textContent;
        pokeFlavor.textContent = getJapaneseFlavor(species) || "図鑑説明は未取得です。";
        nationalDex.textContent = customRecord?.nationalDex || species.id;
        heightText.textContent  = `${pokemon.height / 10} m`;
        weightText.textContent  = `${pokemon.weight / 10} kg`;

        renderTypes(pokemon.types || []);
        await renderAbilities(pokemon.abilities || []);
        renderStats(pokemon.stats || []);
        renderTypeEffectiveness((pokemon.types||[]).map(t=>t.type.name));
        renderLocalDex(mergedDex);
        // Evolution chain — clickable buttons
        evolutionBox.innerHTML = "";
        if (!evoNames.length) {
          evolutionBox.textContent = "進化系統データなし";
        } else {
          const chain = document.createElement("div");
          chain.className = "evo-chain";
          evoNames.forEach((evo, i) => {
            if (i > 0) {
              const arrow = document.createElement("span");
              arrow.className = "evo-arrow";
              arrow.textContent = "→";
              chain.appendChild(arrow);
            }
            const btn = document.createElement("button");
            btn.className = "evo-btn" + (evo.en === pokemon.name ? " current" : "");
            btn.textContent = evo.ja;
            if (evo.en !== pokemon.name) {
              btn.addEventListener("click", () => loadPokemonDetail(evo.en));
            }
            chain.appendChild(btn);
          });
          evolutionBox.appendChild(chain);
        }
        renderGameData(customRecord);
        renderCustomMemo(customRecord);

        currentPokemonData = {
          name: nameJa,
          types: (pokemon.types||[]).map(t=>TYPE_JA[t.type.name]||t.type.name),
          abilities: Array.from(abilityList.querySelectorAll(".badge")).map(x=>x.textContent),
          memo: [`全国図鑑: ${customRecord?.nationalDex||species.id}`, customRecord?.memo ? `補完メモ: ${customRecord.memo}` : ""].filter(Boolean).join("\n")
        };

        resultCard.classList.add("show");
        loadingText.textContent = "";
        resultCard.scrollIntoView({ behavior:"smooth", block:"start" });
      } catch(_) {
        loadingText.textContent = "";
        errorText.textContent = "データが見つかりませんでした。英語名または全国図鑑番号でも試してください。";
      }
    }

    async function searchPokemon() {
      const query = await normalizeQuery(searchInput.value);
      if (!query) { errorText.textContent = "ポケモン名か図鑑番号を入れてください。"; return; }
      await loadPokemonDetail(query);
    }

    function clearResult() {
      searchInput.value = "";
      errorText.textContent = "";
      loadingText.textContent = "";
      evolutionBox.textContent = "";
      weaknessList.innerHTML = ""; resistList.innerHTML = ""; immuneList.innerHTML = "";
      currentPokemonData = null; partyAddStatus.textContent = "";
      resultCard.classList.remove("show");
    }

    // ════════════════════════════════════════
    //  Advanced Search Logic
    // ════════════════════════════════════════

    // Returns set of pokemon species names for a type
    async function fetchPokemonByType(typeName) {
      const data = await cachedFetchJson(`${API_BASE}/type/${typeName}`);
      // includes both pokemon.pokemon.name (form names) — use species instead if available
      return new Set(
        (data.pokemon || []).map(p => {
          // strip form suffixes to get base name for matching
          return p.pokemon.name;
        })
      );
    }

    // Returns all pokemon names in a generation (by national dex range)
    async function fetchPokemonByGen(genNum) {
      const [min, max] = GEN_RANGES[genNum];
      // fetch species list and filter by id
      const data = await cachedFetchJson(`${API_BASE}/pokemon?limit=2000&offset=0`);
      // pokemon endpoint doesn't give id directly, but names follow pattern
      // More reliably: fetch generation endpoint
      const genData = await cachedFetchJson(`${API_BASE}/generation/${genNum}`);
      return new Set((genData.pokemon_species||[]).map(s=>s.name));
    }

    // Fetch lightweight pokemon data for list display
    async function fetchPokemonSummary(name) {
      const p = await cachedFetchJson(`${API_BASE}/pokemon/${name}`);
      return {
        id:      p.id,
        name:    p.name,
        sprite:  p.sprites?.front_default || "",
        types:   (p.types||[]).map(t=>t.type.name),
        stats:   p.stats || []
      };
    }

    function meetsStatFilters(stats) {
      const getVal = key => (stats.find(s=>s.stat.name===key)?.base_stat ?? 0);
      const checks = [
        [el("minHp"),     "hp"],
        [el("minAtk"),    "attack"],
        [el("minDef"),    "defense"],
        [el("minSpAtk"),  "special-attack"],
        [el("minSpDef"),  "special-defense"],
        [el("minSpeed"),  "speed"]
      ];
      for (const [input, key] of checks) {
        const min = parseInt(input.value);
        if (!isNaN(min) && min > 0 && getVal(key) < min) return false;
      }
      const minBst = parseInt(el("minBst").value);
      if (!isNaN(minBst) && minBst > 0) {
        const bst = stats.reduce((sum, s) => sum + s.base_stat, 0);
        if (bst < minBst) return false;
      }
      return true;
    }

    function hasStatFilters() {
      const ids = ["minHp","minAtk","minDef","minSpAtk","minSpDef","minSpeed","minBst"];
      return ids.some(id => { const v = parseInt(el(id).value); return !isNaN(v) && v > 0; });
    }

    async function runAdvancedSearch() {
      advErrorText.textContent = "";
      const t1  = typeFilter1.value;
      const t2  = typeFilter2.value;
      const gen = genFilter.value;

      if (!t1 && !t2 && !gen) {
        advErrorText.textContent = "タイプまたは世代を1つ以上選択してください。";
        return;
      }
      if (t1 && t2 && t1 === t2) {
        advErrorText.textContent = "タイプ１とタイプ２に同じタイプは選択できません。";
        return;
      }

      advLoadingText.textContent = "検索中...";
      searchResultsCard.classList.remove("show");

      try {
        let candidateNames = null; // null = no restriction yet

        // ── Type filter ──
        if (t1) {
          const s1 = await fetchPokemonByType(t1);
          candidateNames = candidateNames ? new Set([...candidateNames].filter(n=>s1.has(n))) : s1;
        }
        if (t2) {
          const s2 = await fetchPokemonByType(t2);
          candidateNames = candidateNames ? new Set([...candidateNames].filter(n=>s2.has(n))) : s2;
        }

        // ── Generation filter ──
        if (gen) {
          const genSet = await fetchPokemonByGen(gen);
          // genSet contains species names; candidateNames contains pokemon form names
          // Map: species name → all forms. For simplicity, filter by matching base name.
          if (candidateNames === null) {
            // Build from gen set — fetch all pokemon in range
            const [min, max] = GEN_RANGES[gen];
            const ids = [];
            for (let i = min; i <= max; i++) ids.push(String(i));
            candidateNames = new Set(ids);
          } else {
            // Filter existing set: keep if the species name matches
            // Pokemon names often match species names (base forms)
            const genData = await cachedFetchJson(`${API_BASE}/generation/${gen}`);
            const genSpecies = new Set((genData.pokemon_species||[]).map(s=>s.name));
            candidateNames = new Set([...candidateNames].filter(n => {
              // strip form suffix
              const base = n.replace(/-(?:mega|alola|galar|hisui|paldea|attack|defense|speed|plant|sandy|trash|heat|wash|frost|fan|mow|origin|altered|land|sky|red-striped|blue-striped|normal|zen|standard|incarnate|therian|white|black|resolute|ordinary|pirouette|aria|star|unbound|complete|midday|midnight|dusk|dusk-mane|dawn-wings|ultra|school|solo|disguised|busted|original|hangry|ice|noice|crowned|eternamax|single-strike|rapid-strike|ice-rider|shadow-rider|hero|teal-mask|wellspring-mask|hearthflame-mask|cornerstone-mask|combat-breed|blaze-breed|aqua-breed)$/,"").replace(/-\d+$/,"");
              return genSpecies.has(n) || genSpecies.has(base);
            }));
          }
        }

        if (!candidateNames || candidateNames.size === 0) {
          advLoadingText.textContent = "";
          advErrorText.textContent = "条件に合うポケモンが見つかりませんでした。";
          return;
        }

        const nameList = [...candidateNames];

        // ── Stat filter (requires fetching each pokemon) ──
        const needStats = hasStatFilters();
        let filtered = [];

        if (needStats) {
          advLoadingText.textContent = `フィルター適用中 (0/${nameList.length})...`;
          let done = 0;
          // Fetch in small batches to avoid flooding
          const BATCH = 10;
          for (let i = 0; i < nameList.length; i += BATCH) {
            const batch = nameList.slice(i, i + BATCH);
            const results = await Promise.allSettled(batch.map(n => fetchPokemonSummary(n)));
            for (const r of results) {
              if (r.status === "fulfilled" && meetsStatFilters(r.value.stats)) {
                filtered.push(r.value);
              }
            }
            done += batch.length;
            advLoadingText.textContent = `フィルター適用中 (${Math.min(done, nameList.length)}/${nameList.length})...`;
          }
        } else {
          // Just get basic info
          advLoadingText.textContent = `リスト取得中 (0/${nameList.length})...`;
          const BATCH = 20;
          let done = 0;
          for (let i = 0; i < nameList.length; i += BATCH) {
            const batch = nameList.slice(i, i + BATCH);
            const results = await Promise.allSettled(batch.map(n => fetchPokemonSummary(n)));
            for (const r of results) {
              if (r.status === "fulfilled") filtered.push(r.value);
            }
            done += batch.length;
            advLoadingText.textContent = `リスト取得中 (${Math.min(done, nameList.length)}/${nameList.length})...`;
          }
        }

        // Sort by id
        filtered.sort((a,b) => a.id - b.id);

        // Apply strict dual-type filter (both types must exactly match)
        if (t1 && t2) {
          filtered = filtered.filter(p => p.types.includes(t1) && p.types.includes(t2));
        } else if (t1) {
          filtered = filtered.filter(p => p.types.includes(t1));
        } else if (t2) {
          filtered = filtered.filter(p => p.types.includes(t2));
        }

        advLoadingText.textContent = "";

        if (!filtered.length) {
          advErrorText.textContent = "条件に合うポケモンが見つかりませんでした。";
          return;
        }

        advResults  = filtered;
        currentPage = 1;
        renderResultsPage();

      } catch(e) {
        advLoadingText.textContent = "";
        advErrorText.textContent = "検索中にエラーが発生しました。しばらく待ってから再試行してください。";
        console.error(e);
      }
    }

    function renderResultsPage() {
      const total = advResults.length;
      const pages = Math.ceil(total / PAGE_SIZE);
      const start = (currentPage - 1) * PAGE_SIZE;
      const slice = advResults.slice(start, start + PAGE_SIZE);

      let label = "";
      const t1 = typeFilter1.value, t2 = typeFilter2.value, gen = genFilter.value;
      const parts = [];
      if (t1) parts.push(TYPE_JA[t1] || t1);
      if (t2) parts.push(TYPE_JA[t2] || t2);
      if (gen) parts.push(`第${gen}世代`);
      label = parts.join(" / ");

      resultsTitle.textContent = `${label} の検索結果`;
      resultsCount.textContent = `${total} 件 (${currentPage}/${pages} ページ)`;

      resultsList.innerHTML = "";
      slice.forEach(p => {
        const item = document.createElement("div");
        item.className = "poke-result-item";
        item.innerHTML = `
          <img src="${escapeHtml(p.sprite)}" alt="${escapeHtml(p.name)}" loading="lazy">
          <span class="poke-no">No.${p.id}</span>
          <div>
            <div class="poke-name">${escapeHtml(p.name)}</div>
            <div class="poke-types">
              ${p.types.map(t=>`<span class="type-chip type-${t}">${TYPE_JA[t]||t}</span>`).join("")}
            </div>
          </div>
        `;
        item.addEventListener("click", () => {
          searchInput.value = p.name;
          loadPokemonDetail(p.name);
        });
        resultsList.appendChild(item);
      });

      // Pager
      pager.innerHTML = "";
      if (pages > 1) {
        const prev = document.createElement("button");
        prev.textContent = "◀ 前";
        prev.disabled = currentPage === 1;
        prev.addEventListener("click", () => { currentPage--; renderResultsPage(); });
        const info = document.createElement("span");
        info.className = "page-info";
        info.textContent = `${currentPage} / ${pages}`;
        const next = document.createElement("button");
        next.textContent = "次 ▶";
        next.disabled = currentPage === pages;
        next.addEventListener("click", () => { currentPage++; renderResultsPage(); });
        pager.append(prev, info, next);
      }

      searchResultsCard.classList.add("show");
      searchResultsCard.scrollIntoView({ behavior:"smooth", block:"start" });
    }

    function resetAdvanced() {
      typeFilter1.value = "";
      typeFilter2.value = "";
      genFilter.value   = "";
      ["minHp","minAtk","minDef","minSpAtk","minSpDef","minSpeed","minBst"].forEach(id => el(id).value = "");
      advLoadingText.textContent = "";
      advErrorText.textContent   = "";
      advResults  = [];
      searchResultsCard.classList.remove("show");
    }

    // ── Event Listeners ──
    searchBtn.addEventListener("click",  searchPokemon);
    clearBtn.addEventListener("click",   clearResult);
    searchInput.addEventListener("keydown", e => { if (e.key === "Enter") searchPokemon(); });

    advSearchBtn.addEventListener("click", runAdvancedSearch);
    advClearBtn.addEventListener("click",  resetAdvanced);
    resultsCloseBtn.addEventListener("click", () => searchResultsCard.classList.remove("show"));

    statToggle.addEventListener("click", () => {
      const open = statPanel.style.display === "block";
      statPanel.style.display = open ? "none" : "block";
      statToggle.textContent = open ? "▸ 種族値フィルター" : "▾ 種族値フィルター";
      statToggle.classList.toggle("active", !open);
    });

    addToPartyBtn.addEventListener("click", () => {
      if (!currentPokemonData) { partyAddStatus.textContent = "先にポケモンを検索してください"; return; }
      savePartyCandidate(currentPokemonData);
    });
  })();
  </script>
</body>
</html>
