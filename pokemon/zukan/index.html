<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ポケモン図鑑</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .result-card img{
      width:180px;
      max-width:100%;
      display:block;
      margin:0 auto 14px;
    }
    .stat-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    @media(min-width:700px){
      .stat-grid{grid-template-columns:repeat(3,1fr)}
    }
    .mini-card{
      background:#10131b;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
    }
    .badge-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:12px;
      background:#0f1117;
    }
    .result-card{display:none}
    .result-card.show{display:block}
    .error-box{color:#fda4af;margin-top:10px}
    .loading{color:var(--muted);margin-top:10px}
    .section-gap{margin-top:12px}
    .preline{white-space:pre-wrap}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>ポケモン図鑑</h1>
      <div class="small">API + 補完データ連携版</div>
    </div>
  </header>

  <main class="wrap">
    <a class="back" href="../">← ポケモンへ戻る</a>

    <div class="grid">
      <section class="card">
        <h2>検索</h2>

        <div class="label">ポケモン名 / 全国図鑑番号</div>
        <input id="searchInput" type="text" placeholder="例：pikachu / ピカチュウ / 25">

        <div class="row" style="margin-top:12px;">
          <button class="primary" id="searchBtn" type="button">検索</button>
          <button id="clearBtn" type="button">クリア</button>
        </div>

        <div class="loading" id="loadingText"></div>
        <div class="error-box" id="errorText"></div>

        <div class="small" style="margin-top:12px;">
          補完データ管理ページで入れた地方図鑑番号・作品別データ・補足メモも表示されます。
        </div>

        <div class="section-gap">
          <a class="menu-card" href="../custom-data/" style="display:block;">
            <h2>補完データ管理へ</h2>
            <div class="small">APIに足りない情報を追加・編集</div>
          </a>
        </div>
      </section>

      <section class="card result-card" id="resultCard">
        <h2 id="pokeTitle">検索結果</h2>

        <img id="pokeImage" alt="pokemon image">

        <div class="small preline" id="pokeFlavor"></div>

        <div class="section-gap">
          <div class="label">タイプ</div>
          <div class="badge-list" id="typeList"></div>
        </div>

        <div class="section-gap">
          <div class="label">特性</div>
          <div class="badge-list" id="abilityList"></div>
        </div>

        <div class="section-gap">
          <div class="label">基本情報</div>
          <div class="stat-grid">
            <div class="mini-card"><strong>全国図鑑</strong><div id="nationalDex"></div></div>
            <div class="mini-card"><strong>高さ</strong><div id="heightText"></div></div>
            <div class="mini-card"><strong>重さ</strong><div id="weightText"></div></div>
          </div>
        </div>

        <div class="section-gap">
          <div class="label">種族値</div>
          <div class="stat-grid" id="baseStats"></div>
        </div>

        <div class="section-gap">
          <div class="label">地方図鑑番号</div>
          <div class="badge-list" id="localDexList"></div>
        </div>

        <div class="section-gap">
          <div class="label">作品別データ</div>
          <div id="gameDataBox" class="small"></div>
        </div>

        <div class="section-gap">
          <div class="label">補足メモ</div>
          <div id="customMemoBox" class="small preline"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const API_BASE = "https://pokeapi.co/api/v2";
      const CUSTOM_KEY = "pokemon_custom_data_v1";

      const el = (id) => document.getElementById(id);
      const searchInput = el("searchInput");
      const searchBtn = el("searchBtn");
      const clearBtn = el("clearBtn");
      const loadingText = el("loadingText");
      const errorText = el("errorText");
      const resultCard = el("resultCard");

      const pokeTitle = el("pokeTitle");
      const pokeImage = el("pokeImage");
      const pokeFlavor = el("pokeFlavor");
      const typeList = el("typeList");
      const abilityList = el("abilityList");
      const nationalDex = el("nationalDex");
      const heightText = el("heightText");
      const weightText = el("weightText");
      const baseStats = el("baseStats");
      const localDexList = el("localDexList");
      const gameDataBox = el("gameDataBox");
      const customMemoBox = el("customMemoBox");

      const JA_TO_EN = {
        "フシギダネ":"bulbasaur",
        "ヒトカゲ":"charmander",
        "ゼニガメ":"squirtle",
        "ピカチュウ":"pikachu",
        "イーブイ":"eevee",
        "カビゴン":"snorlax",
        "ミュウツー":"mewtwo",
        "カイリュー":"dragonite",
        "バンギラス":"tyranitar",
        "サーナイト":"gardevoir",
        "メタグロス":"metagross",
        "ルカリオ":"lucario",
        "ガブリアス":"garchomp",
        "ゲッコウガ":"greninja",
        "ミミッキュ":"mimikyu",
        "ドラパルト":"dragapult",
        "ニャオハ":"sprigatito",
        "ホゲータ":"fuecoco",
        "クワッス":"quaxly",
        "コライドン":"koraidon",
        "ミライドン":"miraidon"
      };

      const TYPE_JA = {
        normal:"ノーマル", fire:"ほのお", water:"みず", electric:"でんき", grass:"くさ",
        ice:"こおり", fighting:"かくとう", poison:"どく", ground:"じめん", flying:"ひこう",
        psychic:"エスパー", bug:"むし", rock:"いわ", ghost:"ゴースト", dragon:"ドラゴン",
        dark:"あく", steel:"はがね", fairy:"フェアリー"
      };

      const STAT_JA = {
        hp:"HP",
        attack:"こうげき",
        defense:"ぼうぎょ",
        "special-attack":"とくこう",
        "special-defense":"とくぼう",
        speed:"すばやさ"
      };

      const POKEDEXES = [
        { key:"national", label:"全国" },
        { key:"kanto", label:"カントー" },
        { key:"original-johto", label:"ジョウト" },
        { key:"hoenn", label:"ホウエン" },
        { key:"original-sinnoh", label:"シンオウ" },
        { key:"extended-sinnoh", label:"シンオウ(拡張)" },
        { key:"updated-johto", label:"ジョウト(HGSS)" },
        { key:"updated-unova", label:"イッシュ(更新)" },
        { key:"kalos-central", label:"カロス中央" },
        { key:"kalos-coastal", label:"カロス海岸" },
        { key:"kalos-mountain", label:"カロス山" },
        { key:"original-alola", label:"アローラ" },
        { key:"updated-alola", label:"アローラ(USUM)" },
        { key:"galar", label:"ガラル" },
        { key:"isle-of-armor", label:"ヨロイ島" },
        { key:"crown-tundra", label:"カンムリ雪原" },
        { key:"hisui", label:"ヒスイ" },
        { key:"paldea", label:"パルデア" },
        { key:"kitakami", label:"キタカミ" },
        { key:"blueberry", label:"ブルーベリー" }
      ];

      const dexCache = {};
      const fetchCache = {};

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function normalizeQuery(value) {
        const raw = value.trim();
        if (!raw) return "";
        if (/^\d+$/.test(raw)) return raw;
        if (JA_TO_EN[raw]) return JA_TO_EN[raw];
        return raw.toLowerCase()
          .replaceAll("♀", "-f")
          .replaceAll("♂", "-m")
          .replaceAll("　", " ")
          .replaceAll(" ", "-");
      }

      function loadCustomData() {
        try {
          const raw = localStorage.getItem(CUSTOM_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function findCustomRecord(nameJa, nationalNo) {
        const records = loadCustomData();
        return records.find(r => {
          const byName = (r.name || "").trim() === (nameJa || "").trim();
          const byDex = String(r.nationalDex || "").trim() === String(nationalNo || "").trim();
          return byName || byDex;
        }) || null;
      }

      async function cachedFetchJson(url) {
        if (fetchCache[url]) return fetchCache[url];
        const res = await fetch(url);
        if (!res.ok) throw new Error("fetch_failed");
        const data = await res.json();
        fetchCache[url] = data;
        return data;
      }

      async function fetchPokemon(query) {
        const pokemon = await cachedFetchJson(`${API_BASE}/pokemon/${query}`);
        const species = await cachedFetchJson(pokemon.species.url);
        return { pokemon, species };
      }

      async function fetchPokedexEntry(pokedexKey, speciesName) {
        if (!dexCache[pokedexKey]) {
          dexCache[pokedexKey] = cachedFetchJson(`${API_BASE}/pokedex/${pokedexKey}`);
        }
        const dexData = await dexCache[pokedexKey];
        const entry = (dexData.pokemon_entries || []).find(
          e => e.pokemon_species && e.pokemon_species.name === speciesName
        );
        return entry ? entry.entry_number : null;
      }

      async function getLocalDexNumbers(speciesName) {
        const results = [];
        for (const dex of POKEDEXES) {
          try {
            const num = await fetchPokedexEntry(dex.key, speciesName);
            if (num !== null) {
              results.push({ label: dex.label, number: num, source: "api" });
            }
          } catch (_) {}
        }
        return results;
      }

      function getJapaneseName(species) {
        return species.names?.find(n => n.language.name === "ja-Hrkt")?.name
          || species.names?.find(n => n.language.name === "ja")?.name
          || species.name;
      }

      function getJapaneseFlavor(species) {
        const entry = (species.flavor_text_entries || []).find(
          x => x.language && x.language.name === "ja-Hrkt"
        ) || (species.flavor_text_entries || []).find(
          x => x.language && x.language.name === "ja"
        );
        if (!entry) return "";
        return entry.flavor_text.replace(/\f|\n|\r/g, " ");
      }

      function renderBadgeList(container, texts) {
        container.innerHTML = "";
        if (!texts.length) {
          const span = document.createElement("span");
          span.className = "badge";
          span.textContent = "データなし";
          container.appendChild(span);
          return;
        }
        texts.forEach(text => {
          const span = document.createElement("span");
          span.className = "badge";
          span.textContent = text;
          container.appendChild(span);
        });
      }

      function renderTypes(types) {
        renderBadgeList(typeList, types
          .sort((a, b) => a.slot - b.slot)
          .map(t => TYPE_JA[t.type.name] || t.type.name)
        );
      }

      async function renderAbilities(abilities) {

  abilityList.innerHTML = "";

  for (const a of abilities.sort((a,b)=>a.slot-b.slot)) {

    let name = a.ability.name;

    try{
      const data = await cachedFetchJson(a.ability.url);

      const ja = data.names.find(n => 
        n.language.name === "ja" || n.language.name === "ja-Hrkt"
      );

      if(ja) name = ja.name;

    }catch(e){}

    const span = document.createElement("span");
    span.className = "badge";
    span.textContent = a.is_hidden
      ? `${name}（隠れ特性）`
      : name;

    abilityList.appendChild(span);
  }
      }

      function renderStats(stats) {
        baseStats.innerHTML = "";
        stats.forEach(s => {
          const box = document.createElement("div");
          box.className = "mini-card";
          box.innerHTML = `<strong>${escapeHtml(STAT_JA[s.stat.name] || s.stat.name)}</strong><div>${escapeHtml(String(s.base_stat))}</div>`;
          baseStats.appendChild(box);
        });
      }

      function mergeLocalDex(apiEntries, customRecord) {
        const merged = [...apiEntries];
        const existingLabels = new Set(apiEntries.map(x => x.label));

        (customRecord?.localDex || []).forEach(item => {
          if (!existingLabels.has(item.key)) {
            merged.push({ label: item.key, number: item.value, source: "custom" });
          }
        });

        return merged;
      }

      function renderLocalDex(entries) {
        localDexList.innerHTML = "";
        if (!entries.length) {
          const span = document.createElement("span");
          span.className = "badge";
          span.textContent = "地方図鑑番号なし / 未取得";
          localDexList.appendChild(span);
          return;
        }

        entries.forEach(e => {
          const span = document.createElement("span");
          span.className = "badge";
          span.textContent = e.source === "custom"
            ? `${e.label}: ${e.number}（補完）`
            : `${e.label}: ${e.number}`;
          localDexList.appendChild(span);
        });
      }

      function renderGameData(customRecord) {
        const list = customRecord?.gameData || [];
        if (!list.length) {
          gameDataBox.textContent = "補完データなし";
          return;
        }
        gameDataBox.innerHTML = list.map(item =>
          `<div style="margin-top:6px;"><strong>${escapeHtml(item.key)}</strong>：${escapeHtml(item.value)}</div>`
        ).join("");
      }

      function renderCustomMemo(customRecord) {
        customMemoBox.textContent = customRecord?.memo || "補完メモなし";
      }

      async function searchPokemon() {
        const query = normalizeQuery(searchInput.value);
        errorText.textContent = "";
        loadingText.textContent = "";
        resultCard.classList.remove("show");

        if (!query) {
          errorText.textContent = "ポケモン名か図鑑番号を入れてください。";
          return;
        }

        try {
          loadingText.textContent = "取得中...";
          const { pokemon, species } = await fetchPokemon(query);

          const nameJa = getJapaneseName(species);
          const customRecord = findCustomRecord(nameJa, species.id);
          const apiLocalDex = await getLocalDexNumbers(species.name);
          const mergedLocalDex = mergeLocalDex(apiLocalDex, customRecord);

          pokeTitle.textContent = `No.${species.id} ${nameJa}`;
          pokeImage.src =
            pokemon.sprites?.other?.["official-artwork"]?.front_default ||
            pokemon.sprites?.front_default ||
            "";
          pokeImage.alt = pokeTitle.textContent;

          pokeFlavor.textContent = getJapaneseFlavor(species) || "図鑑説明は未取得です。";
          nationalDex.textContent = customRecord?.nationalDex || species.id;
          heightText.textContent = `${pokemon.height / 10} m`;
          weightText.textContent = `${pokemon.weight / 10} kg`;

          renderTypes(pokemon.types || []);
          await renderAbilities(pokemon.abilities || []);
          renderStats(pokemon.stats || []);
          renderLocalDex(mergedLocalDex);
          renderGameData(customRecord);
          renderCustomMemo(customRecord);

          resultCard.classList.add("show");
          loadingText.textContent = "";
        } catch (e) {
          loadingText.textContent = "";
          errorText.textContent = "データが見つかりませんでした。英語名または全国図鑑番号でも試してください。";
        }
      }

      function clearResult() {
        searchInput.value = "";
        errorText.textContent = "";
        loadingText.textContent = "";
        resultCard.classList.remove("show");
      }

      searchBtn.addEventListener("click", searchPokemon);
      clearBtn.addEventListener("click", clearResult);
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchPokemon();
      });
    })();
  </script>
</body>
</html>
