<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ポケモン図鑑</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <header>
    <div class="wrap">
      <h1>ポケモン図鑑</h1>
      <div class="small">ポケモン情報を確認するページ</div>
    </div>
  </header>

  <main class="wrap">
    <a class="back" href="../">← ポケモンへ戻る</a>

    <section class="card">
      <h2>検索</h2>

      <div class="label">ポケモン名</div>
      <input type="text" placeholder="例：ピカチュウ">

      <div class="label" style="margin-top:10px;">タイプ</div>
      <select>
        <option>すべて</option>
        <option>ノーマル</option>
        <option>ほのお</option>
        <option>みず</option>
        <option>でんき</option>
        <option>くさ</option>
        <option>こおり</option>
        <option>かくとう</option>
        <option>どく</option>
        <option>じめん</option>
        <option>ひこう</option>
        <option>エスパー</option>
        <option>むし</option>
        <option>いわ</option>
        <option>ゴースト</option>
        <option>ドラゴン</option>
        <option>あく</option>
        <option>はがね</option>
        <option>フェアリー</option>
      </select>

      <div class="label" style="margin-top:10px;">メモ</div>
      <div class="card" style="margin-top:6px;">
        ここにあとから図鑑データや画像表示を追加できます。
      </div>
    </section>
  </main>
</body>
</html>
