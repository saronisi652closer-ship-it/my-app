<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Nunito','Noto Sans JP',sans-serif;
    color:#1a2a3a;min-height:100vh;
    background:
      radial-gradient(circle,rgba(255,255,255,0.35) 1px,transparent 1px),
      linear-gradient(180deg,#5bb8f5 0%,#a8d8f0 55%,#c8eac0 75%,#5ab552 100%);
    background-size:28px 28px,100% 100%;
  }
  /* Pokeball deco */
  body::before{content:'';position:fixed;top:-140px;right:-140px;width:380px;height:380px;border-radius:50%;border:42px solid rgba(255,255,255,0.18);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;top:48px;right:-140px;width:380px;height:24px;background:rgba(255,255,255,0.18);pointer-events:none;z-index:0;}
  /* Clouds */
  .cloud{position:fixed;border-radius:50px;background:rgba(255,255,255,0.55);pointer-events:none;z-index:0;animation:drift linear infinite;}
  .cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,0.55);border-radius:50%;}
  .cloud-1{width:100px;height:30px;top:6%;left:-120px;animation-duration:40s;animation-delay:-8s;}
  .cloud-1::before{width:50px;height:44px;top:-22px;left:14px;}
  .cloud-1::after{width:36px;height:36px;top:-16px;left:44px;}
  .cloud-2{width:70px;height:22px;top:15%;left:-90px;animation-duration:55s;animation-delay:-25s;}
  .cloud-2::before{width:36px;height:32px;top:-16px;left:10px;}
  .cloud-2::after{width:28px;height:28px;top:-12px;left:32px;}
  @keyframes drift{from{transform:translateX(0);}to{transform:translateX(calc(100vw + 200px));}}
  input::placeholder,textarea::placeholder{color:#a0b8cc}
  select option{background:#e8f4ff;color:#1a2a3a}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#f0f7ff;border-radius:4px}
  ::-webkit-scrollbar-thumb{background:#a8d8f0;border-radius:4px}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes popIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>

function calcMult(defTypes,atkType){let m=1;for(const t of defTypes){const c=TYPE_CHART[t];if(!c)continue;if(c.immune.includes(atkType))m*=0;else if(c.weak.includes(atkType))m*=2;else if(c.resist.includes(atkType))m*=0.5;}return m;}

const apiCache={};
async function fetchPokemon(jaName){
  if(apiCache[jaName])return apiCache[jaName];
  const en=NAME_JA_TO_EN[jaName];if(!en)return null;
  try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${en}`);if(!r.ok)return null;const d=await r.json();const result={types:d.types.map(t=>t.type.name),sprite:d.sprites?.front_default||null};apiCache[jaName]=result;return result;}catch{return null;}
}

"テツノカシラ","テツノドクガ","テツノイバラ","テツノワダチ","チヲハウハネ",
];

function TypeBadge({type,small}){
  return React.createElement('span',{style:{background:TYPE_COLORS[type]||"#888",color:"#fff",fontSize:small?"10px":"11px",fontWeight:"700",padding:small?"1px 5px":"2px 7px",borderRadius:"4px",textShadow:"0 1px 2px rgba(0,0,0,0.4)",display:"inline-block",marginRight:"2px",marginBottom:"2px"}},type);
}

function Msg({msg}){
  const isUser=msg.role==="user";
  return React.createElement('div',{style:{display:"flex",justifyContent:isUser?"flex-end":"flex-start",marginBottom:"10px",animation:"fadeIn 0.2s ease"}},
    !isUser&&React.createElement('div',{style:{width:"30px",height:"30px",borderRadius:"50%",background:"linear-gradient(135deg,#e3350d,#c0280a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0,marginRight:"8px",alignSelf:"flex-end",boxShadow:"0 2px 6px rgba(180,30,0,0.25)"}},"🤖"),
    React.createElement('div',{style:{maxWidth:"80%",background:isUser?"linear-gradient(135deg,#e3350d,#c0280a)":"rgba(255,255,255,0.92)",color:isUser?"#fff":"#1a2a3a",padding:"10px 14px",fontSize:"13px",lineHeight:"1.6",borderRadius:isUser?"16px 16px 4px 16px":"16px 16px 16px 4px",border:isUser?"none":"2px solid rgba(255,255,255,0.95)",whiteSpace:"pre-wrap",boxShadow:isUser?"0 3px 10px rgba(180,30,0,0.2)":"0 2px 10px rgba(50,120,180,0.1)",fontWeight:"600"}},msg.content)
  );
}

function App(){
  const[tab,setTab]=useState("party");
  const[members,setMembers]=useState(["","","","","",""]);
  const[pName,setPName]=useState("");
  const[pGame,setPGame]=useState("");
  const[pTags,setPTags]=useState("");
  const[pNotes,setPNotes]=useState("");
  const[sprites,setSprites]=useState({});
  const[apiTypes,setApiTypes]=useState({});
  const[parties,setParties]=useState(()=>{try{return JSON.parse(localStorage.getItem("pkm_v2"))||[];}catch{return[];}});
  const[editId,setEditId]=useState(null);
  const[filterGame,setFilterGame]=useState("");
  const[searchKw,setSearchKw]=useState("");
  const[analysis,setAnalysis]=useState(null);
  const[msgs,setMsgs]=useState([{role:"assistant",content:"こんにちは！🎮 ポケモンチャンピオンズの構築相談はお任せください。\n\n① 「構築」タブでメンバーを入力\n② 「分析」タブで弱点チェック\n③ 「AI」タブで相談\n\n…の流れがおすすめです！"}]);
  const[chatIn,setChatIn]=useState("");
  const[chatLoading,setChatLoading]=useState(false);
  const[status,setStatus]=useState("");
  const[pickerSlot,setPickerSlot]=useState(null);
  const[pickerSearch,setPickerSearch]=useState("");
  // APIキー管理
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem(STORAGE_KEY_API)||"");
  const[showKeyModal,setShowKeyModal]=useState(false);
  const[keyInput,setKeyInput]=useState("");
  const chatEndRef=useRef(null);
  const fileRef=useRef(null);

  const isChampions=pGame==="ポケモンチャンピオンズ (M-A)";

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  useEffect(()=>{localStorage.setItem("pkm_v2",JSON.stringify(parties));},[parties]);

  const toast=(m)=>{setStatus(m);setTimeout(()=>setStatus(""),2500);};
  const getEnTypes=(name)=>apiTypes[name]||FALLBACK_TYPES[name]||null;

  const saveApiKey=()=>{
    const k=keyInput.trim();
    if(!k){toast("⚠️ キーを入力してください");return;}
    localStorage.setItem(STORAGE_KEY_API,k);
    setApiKey(k);setShowKeyModal(false);setKeyInput("");
    toast("🔑 APIキーを保存しました");
  };
  const clearApiKey=()=>{
    localStorage.removeItem(STORAGE_KEY_API);
    setApiKey("");toast("🗑️ APIキーを削除しました");
  };

  const openPicker=(slotIdx)=>{
    setPickerSlot(slotIdx);setPickerSearch("");
    // pre-fetch sprites for visible Champions pokemon
    CHAMPIONS_MA.slice(0,60).forEach(async n=>{
      if(sprites[n]!==undefined)return;
      const d=await fetchPokemon(n);
      if(d) setSprites(p=>({...p,[n]:d.sprite}));
      else setSprites(p=>({...p,[n]:null}));
    });
  };
  const closePicker=()=>{setPickerSlot(null);setPickerSearch("");};
  const pickPokemon=(name)=>{
    const n=[...members]; n[pickerSlot]=name; setMembers(n);
    closePicker();
  };
  const filteredPicker=CHAMPIONS_MA.filter(p=>p.includes(pickerSearch));

  useEffect(()=>{
    members.filter(Boolean).forEach(async n=>{
      if(sprites[n]!==undefined)return;
      const d=await fetchPokemon(n);
      if(d){setSprites(p=>({...p,[n]:d.sprite}));setApiTypes(p=>({...p,[n]:d.types}));}
      else setSprites(p=>({...p,[n]:null}));
    });
  },[members]);

  const analyze=useCallback(()=>{
    const filled=members.filter(Boolean);
    if(!filled.length){setAnalysis(null);return;}
    const weakCount={},quadNames={};
    Object.keys(TYPE_JA_TO_EN).forEach(t=>{weakCount[t]=0;quadNames[t]=[];});
    const unknown=[];
    members.forEach(name=>{
      if(!name)return;
      const et=getEnTypes(name);
      if(!et){unknown.push(name);return;}
      Object.keys(TYPE_CHART).forEach(atkEn=>{
        const m=calcMult(et,atkEn);const jaAtk=TYPE_EN_TO_JA[atkEn];if(!jaAtk)return;
        if(m>=4){weakCount[jaAtk]++;quadNames[jaAtk].push(name);}
        else if(m>1)weakCount[jaAtk]++;
      });
    });
    const sorted=Object.entries(weakCount).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);
    const quads=Object.entries(quadNames).filter(([,n])=>n.length>0);
    const coverage=[...new Set(filled.flatMap(n=>{const et=getEnTypes(n)||[];return et.map(e=>TYPE_EN_TO_JA[e]).filter(Boolean);}))];
    setAnalysis({sorted,quads,coverage,unknown});
  },[members,apiTypes]);

  useEffect(()=>{if(tab==="analyze")analyze();},[tab,analyze]);

  const saveParty=()=>{
    if(!pName.trim()){toast("⚠️ パーティ名を入力してください");return;}
    const entry={id:editId||"p_"+Date.now(),name:pName.trim(),game:pGame,members:members.filter(Boolean),tags:pTags.split(",").map(t=>t.trim()).filter(Boolean),notes:pNotes.trim(),updatedAt:new Date().toISOString()};
    setParties(prev=>{const i=prev.findIndex(p=>p.id===entry.id);if(i>=0){const n=[...prev];n[i]=entry;return n;}return[entry,...prev];});
    setEditId(entry.id);toast(editId?"✅ 更新しました":"✅ 保存しました");
  };

  const loadParty=(p)=>{
    setEditId(p.id);setPName(p.name||"");setPGame(p.game||"");
    const m=[...(p.members||[]),...["","","","","",""]].slice(0,6);
    setMembers(m);setPTags((p.tags||[]).join(", "));setPNotes(p.notes||"");
    setSprites({});setApiTypes({});setTab("party");toast("📋 読み込みました");
  };

  const deleteParty=(id,name)=>{
    if(!confirm(`「${name||"このパーティ"}」を削除しますか？`))return;
    setParties(prev=>prev.filter(p=>p.id!==id));
    if(editId===id)clearForm();toast("🗑️ 削除しました");
  };

  const clearForm=()=>{setEditId(null);setPName("");setPGame("");setMembers(["","","","","",""]);setPTags("");setPNotes("");setSprites({});setApiTypes({});};

  const exportData=()=>{
    const blob=new Blob([JSON.stringify(parties,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`pkm_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  };

  const importData=(file)=>{
    const r=new FileReader();r.onload=e=>{try{const data=JSON.parse(e.target.result);if(!Array.isArray(data))throw 0;const ids=new Set(parties.map(p=>p.id));const add=data.filter(p=>!ids.has(p.id));setParties(prev=>[...add,...prev]);toast(`✅ ${add.length}件インポート`);}catch{toast("❌ 読み込み失敗");}};r.readAsText(file);
  };

  const sendChat=async()=>{
    if(!chatIn.trim()||chatLoading)return;
    if(!apiKey){setShowKeyModal(true);setKeyInput("");return;}
    const userMsg=chatIn.trim();setChatIn("");
    const filled=members.filter(Boolean);
    const partyCtx=filled.length>0?`\n\n【現在のパーティ】\n${filled.map(n=>{const et=getEnTypes(n)||[];const jt=et.map(e=>TYPE_EN_TO_JA[e]).filter(Boolean);return`・${n}${jt.length?`（${jt.join("/")}）`:""}`;}).join("\n")}`:"";

    // 会話履歴をGemini形式に変換（systemメッセージは最初のuserに統合）
    const systemPrompt=`あなたはポケモンチャンピオンズの構築アドバイザーです。タイプ相性・環境メタ・役割分担を踏まえて日本語で簡潔にアドバイスしてください。${partyCtx}`;
    const history=[...msgs,{role:"user",content:userMsg}];
    // Gemini形式: [{role:"user",parts:[{text:"..."}]}, {role:"model",parts:[{text:"..."}]}]
    const geminiContents=history.map((m,i)=>({
      role:m.role==="user"?"user":"model",
      parts:[{text: i===0&&m.role==="user" ? systemPrompt+"\n\n"+m.content : m.content}]
    }));

    const newMsgs=[...msgs,{role:"user",content:userMsg}];
    setMsgs(newMsgs);setChatLoading(true);
    try{
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent`,
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "x-goog-api-key": apiKey
          },
          body:JSON.stringify({
            contents: geminiContents,
            generationConfig:{maxOutputTokens:1000,temperature:0.7}
          })
        }
      );
      if(!res.ok){
        const err=await res.json().catch(()=>({}));
        const msg=err?.error?.message||`HTTPエラー: ${res.status}`;
        if(res.status===400||res.status===403){
          setMsgs([...newMsgs,{role:"assistant",content:"⚠️ APIキーが無効です。Gemini APIキーを確認して再設定してください。"}]);
          setShowKeyModal(true);setKeyInput("");
        }else{
          setMsgs([...newMsgs,{role:"assistant",content:`⚠️ エラー: ${msg}`}]);
        }
        return;
      }
      const d=await res.json();
      const text=d?.candidates?.[0]?.content?.parts?.[0]?.text||"応答を取得できませんでした";
      setMsgs([...newMsgs,{role:"assistant",content:text}]);
    }catch(err){
      setMsgs([...newMsgs,{role:"assistant",content:`⚠️ 通信エラー: ${err.message||"不明なエラー"}`}]);
    }
    finally{setChatLoading(false);}
  };

  const filtered=parties.filter(p=>{
    if(filterGame&&p.game!==filterGame)return false;
    if(searchKw){const kw=searchKw.toLowerCase();return[p.name,p.game,...(p.members||[]),...(p.tags||[]),p.notes].join(" ").toLowerCase().includes(kw);}
    return true;
  });

  const filled=members.filter(Boolean);

  // ── Light Pokemon theme styles ──
  const SKY="#5bb8f5", RED="#e3350d", YELLOW="#ffcb05", TEXT="#1a2a3a", MUTED="#6b8fa8";
  const BG={minHeight:"100vh",position:"relative",zIndex:1};
  const WRAP={maxWidth:"430px",margin:"0 auto",display:"flex",flexDirection:"column",minHeight:"100vh",position:"relative",zIndex:1};
  const inp={width:"100%",background:"#f0f7ff",border:"2px solid #d4e8f5",borderRadius:"10px",color:TEXT,padding:"9px 12px",fontSize:"14px",outline:"none",boxSizing:"border-box",fontFamily:"'Nunito',sans-serif"};
  const card={background:"rgba(255,255,255,0.92)",border:"2px solid rgba(255,255,255,0.95)",borderRadius:"16px",padding:"14px",boxShadow:"0 4px 20px rgba(50,120,180,0.1)"};
  const lbl={fontSize:"11px",color:MUTED,fontWeight:"700",marginBottom:"5px",letterSpacing:"0.5px",display:"block",textTransform:"uppercase"};
  const btn=(v="d")=>({padding:"9px 16px",borderRadius:"10px",border:"none",fontWeight:"700",fontSize:"13px",cursor:"pointer",fontFamily:"'Nunito',sans-serif",
    background:v==="p"?"linear-gradient(135deg,#e3350d,#c0280a)":v==="g"?"linear-gradient(135deg,#5ab552,#3a8530)":v==="r"?"rgba(220,50,50,0.08)":"#f0f7ff",
    color:v==="p"?"#fff":v==="g"?"#fff":v==="r"?"#c03030":MUTED,
    border:v==="r"?"2px solid rgba(200,50,50,0.2)":v==="d"?"2px solid #d4e8f5":"none",
    boxShadow:v==="p"?"0 3px 10px rgba(180,30,0,0.25)":v==="g"?"0 3px 10px rgba(40,140,40,0.25)":"none"
  });

  const e=React.createElement;

  return e('div',{style:BG},
    e('div',{className:"cloud cloud-1"}),
    e('div',{className:"cloud cloud-2"}),
    e('div',{style:WRAP},
      // Header
      e('div',{style:{padding:"14px 16px 10px",background:"linear-gradient(135deg,#e3350d,#c0280a)",flexShrink:0,position:"sticky",top:0,zIndex:10,boxShadow:"0 4px 16px rgba(180,30,0,0.3)",overflow:"hidden"}},
        // Pokeball ring deco
        e('div',{style:{position:"absolute",top:"-30px",right:"-30px",width:"100px",height:"100px",borderRadius:"50%",border:"16px solid rgba(255,255,255,0.12)",pointerEvents:"none"}}),
        e('div',{style:{position:"absolute",top:"18px",right:"-30px",width:"100px",height:"8px",background:"rgba(255,255,255,0.12)",pointerEvents:"none"}}),
        e('div',{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px",position:"relative"}},
          // Back button
          e('a',{href:"../",style:{display:"flex",alignItems:"center",justifyContent:"center",width:"30px",height:"30px",borderRadius:"50%",background:"rgba(255,255,255,0.2)",color:"#fff",textDecoration:"none",fontSize:"16px",flexShrink:0,fontWeight:"700",lineHeight:1}},"‹"),
          // Mini pokeball icon
          e('div',{style:{width:"32px",height:"32px",borderRadius:"50%",background:"linear-gradient(180deg,#fff 50%,#333 50%)",border:"2px solid #333",flexShrink:0,position:"relative",boxShadow:"0 2px 6px rgba(0,0,0,0.3)"}},
            e('div',{style:{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:"9px",height:"9px",borderRadius:"50%",background:"#fff",border:"2px solid #333"}})
          ),
          e('div',null,
            e('div',{style:{fontSize:"15px",fontWeight:"900",color:"#fff",textShadow:"0 1px 4px rgba(0,0,0,0.2)"}},"PokéChampions"),
            e('div',{style:{fontSize:"10px",color:"rgba(255,255,255,0.75)",fontWeight:"600"}},"構築マネージャー")
          ),
          e('div',{style:{marginLeft:"auto",fontSize:"11px",fontWeight:"700",color:"rgba(255,255,255,0.8)",background:"rgba(255,255,255,0.15)",borderRadius:"999px",padding:"2px 10px"}},`${filled.length}/6`)
        ),
        e('div',{style:{display:"flex",gap:"5px",position:"relative"}},
          [["party","🛡️ 構築"],["analyze","🔬 分析"],["saved","📁 保存"],["chat","🤖 AI"]].map(([k,l])=>
            e('button',{key:k,onClick:()=>setTab(k),style:{flex:1,padding:"7px 2px",background:tab===k?"rgba(255,255,255,0.95)":"rgba(255,255,255,0.15)",border:"none",borderRadius:"9px",color:tab===k?RED:"rgba(255,255,255,0.85)",fontWeight:"700",fontSize:"11px",cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:tab===k?"0 2px 6px rgba(0,0,0,0.15)":"none"}},l)
          )
        )
      ),

      // Content
      e('div',{style:{flex:1,overflow:"auto",padding:"14px",paddingBottom:tab==="chat"?"80px":"14px"}},

        // ── PARTY ──
        tab==="party"&&e('div',{style:{display:"flex",flexDirection:"column",gap:"12px"}},
          status&&e('div',{style:{background:"rgba(90,181,82,0.12)",border:"2px solid rgba(90,181,82,0.3)",borderRadius:"10px",padding:"8px 12px",fontSize:"13px",color:"#2a7a20",textAlign:"center",animation:"fadeIn 0.2s",fontWeight:"700"}},status),
          e('div',{style:card},
            e('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}},
              e('div',null,e('span',{style:lbl},"パーティ名"),e('input',{style:inp,value:pName,onChange:ev=>setPName(ev.target.value),placeholder:"例：チャンピオンズ用"})),
              e('div',null,e('span',{style:lbl},"作品"),e('select',{style:{...inp,appearance:"none"},value:pGame,onChange:ev=>setPGame(ev.target.value)},e('option',{value:""},"未設定"),...GAMES.map(g=>e('option',{key:g,value:g},g))))
            )
          ),
          e('div',{style:{...card,borderColor:isChampions?"rgba(227,53,13,0.25)":"rgba(255,255,255,0.95)"}},
            e('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}},
              e('span',{style:lbl},"メンバー（日本語名で入力）"),
              isChampions&&e('span',{style:{fontSize:"10px",background:"rgba(227,53,13,0.1)",border:"1px solid rgba(227,53,13,0.3)",borderRadius:"6px",padding:"2px 7px",color:RED,fontWeight:"700"}},"M-A対応")
            ),
            isChampions&&e('p',{style:{fontSize:"11px",color:MUTED,marginBottom:"8px"}},"🎯 スロットをタップしてM-A使用可能ポケモンから選択できます"),
            e('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
              members.map((m,i)=>e('div',{key:i,style:{position:"relative"}},
                isChampions
                  ? e('div',{style:{display:"flex",gap:"4px"}},
                      sprites[m]&&e('img',{src:sprites[m],alt:m,style:{width:"36px",height:"36px",imageRendering:"pixelated",flexShrink:0,alignSelf:"center"}}),
                      e('button',{
                        onClick:()=>openPicker(i),
                        style:{flex:1,background:m?"rgba(227,53,13,0.06)":"#f0f7ff",border:`2px solid ${m?"rgba(227,53,13,0.3)":"#d4e8f5"}`,borderRadius:"10px",color:m?RED:MUTED,padding:"9px 8px",fontSize:"13px",fontWeight:m?"700":"600",cursor:"pointer",textAlign:"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif"}
                      },m||`${i+1}体目を選ぶ`)
                    )
                  : e('div',null,
                      e('input',{style:{...inp,paddingLeft:sprites[m]?"38px":"12px"},value:m,onChange:ev=>{const n=[...members];n[i]=ev.target.value;setMembers(n);},placeholder:`${i+1}体目`}),
                      sprites[m]&&e('img',{src:sprites[m],alt:m,style:{position:"absolute",left:"2px",top:"50%",transform:"translateY(-50%)",width:"32px",height:"32px",imageRendering:"pixelated",pointerEvents:"none"}})
                    )
              ))
            ),
            filled.length>0&&e('div',{style:{marginTop:"10px",display:"flex",flexWrap:"wrap",gap:"2px"}},
              [...new Set(filled.flatMap(n=>{const et=getEnTypes(n)||[];return et.map(e2=>TYPE_EN_TO_JA[e2]).filter(Boolean);}))].map(t=>e(TypeBadge,{key:t,type:t,small:true}))
            )
          ),
          e('div',{style:card},
            e('span',{style:lbl},"タグ（カンマ区切り）"),
            e('input',{style:inp,value:pTags,onChange:ev=>setPTags(ev.target.value),placeholder:"例：ランクマ, 雨パ, 受けループ"}),
            e('span',{style:{...lbl,marginTop:"10px"}},"構築メモ"),
            e('textarea',{style:{...inp,minHeight:"70px",resize:"vertical",lineHeight:"1.5"},value:pNotes,onChange:ev=>setPNotes(ev.target.value),placeholder:"役割・技・持ち物・育成メモなど"})
          ),
          e('div',{style:{display:"flex",gap:"8px"}},
            e('button',{style:{...btn("p"),flex:1},onClick:saveParty},"💾 保存"),
            e('button',{style:btn(),onClick:clearForm},"クリア"),
            editId&&e('button',{style:btn("r"),onClick:()=>deleteParty(editId,pName)},"削除")
          ),
          e('button',{style:{...btn(),padding:"10px",width:"100%",color:"#1a6fa8",border:"2px solid rgba(26,111,168,0.35)",background:"rgba(91,184,245,0.12)",fontWeight:"800"},onClick:()=>{setTab("analyze");analyze();}},"🔬 弱点を分析する"),
          e('button',{style:{...btn(),padding:"10px",width:"100%",color:"#1e6b18",border:"2px solid rgba(30,107,24,0.35)",background:"rgba(90,181,82,0.12)",fontWeight:"800"},onClick:()=>{setChatIn(filled.length>0?`現在のパーティ：${filled.join("、")}\nこのパーティを評価して改善点を教えてください`:"ポケモンチャンピオンズで強いパーティを教えてください");setTab("chat");}},"🤖 AIに相談する"),

          // ── M-Aピッカーモーダル ──
          pickerSlot!==null&&e('div',{style:{position:"fixed",inset:0,background:"rgba(91,184,245,0.15)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",flexDirection:"column",maxWidth:"430px",margin:"0 auto"}},
            e('div',{style:{padding:"16px 16px 10px",borderBottom:"2px solid #d4e8f5",background:"rgba(255,255,255,0.95)"}},
              e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
                e('div',null,
                  e('div',{style:{fontWeight:"900",fontSize:"15px",color:TEXT}},"スロット"+(pickerSlot+1)+"のポケモンを選ぶ"),
                  e('div',{style:{fontSize:"10px",color:RED,marginTop:"2px",fontWeight:"700"}},"レギュレーションM-A 使用可能ポケモン")
                ),
                e('button',{onClick:closePicker,style:{background:"#f0f7ff",border:"2px solid #d4e8f5",borderRadius:"8px",color:TEXT,width:"32px",height:"32px",cursor:"pointer",fontSize:"16px",fontFamily:"'Nunito',sans-serif"}},"✕")
              ),
              e('input',{
                value:pickerSearch,
                onChange:ev=>setPickerSearch(ev.target.value),
                autoFocus:true,
                placeholder:"ポケモン名で検索...",
                style:{...inp,fontSize:"14px"}
              })
            ),
            e('div',{style:{flex:1,overflow:"auto",padding:"10px 12px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",background:"rgba(255,255,255,0.85)"}},
              filteredPicker.map(name=>{
                const sp=sprites[name];
                const sel=members[pickerSlot]===name;
                return e('button',{
                  key:name,
                  onClick:()=>pickPokemon(name),
                  style:{background:sel?"rgba(227,53,13,0.1)":"rgba(255,255,255,0.9)",border:`2px solid ${sel?"rgba(227,53,13,0.4)":"#d4e8f5"}`,borderRadius:"10px",padding:"8px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",color:sel?RED:TEXT,fontSize:"11px",fontWeight:sel?"800":"600",fontFamily:"'Nunito',sans-serif",boxShadow:sel?"0 2px 8px rgba(227,53,13,0.15)":"none"}
                },
                  sp?e('img',{src:sp,alt:name,style:{width:"44px",height:"44px",imageRendering:"pixelated"}}):e('div',{style:{width:"44px",height:"44px",background:"#f0f7ff",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px"}},"?"),
                  name
                );
              })
            )
          )
        ),

        // ── ANALYZE ──
        tab==="analyze"&&e('div',{style:{display:"flex",flexDirection:"column",gap:"12px"}},
          e('button',{style:{...btn("p"),padding:"11px"},onClick:analyze},"🔄 分析を更新"),
          !analysis?e('div',{style:{...card,textAlign:"center",color:MUTED,padding:"30px",fontSize:"14px"}},"「構築」タブでメンバーを入力してください"):
          e('div',{style:{display:"flex",flexDirection:"column",gap:"12px"}},
            filled.length>0&&e('div',{style:card},
              e('span',{style:lbl},"スプライト"),
              e('div',{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"4px"}},
                filled.map(name=>e('div',{key:name,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}},
                  sprites[name]?e('img',{src:sprites[name],alt:name,style:{width:"56px",height:"56px",imageRendering:"pixelated"}}):e('div',{style:{width:"56px",height:"56px",background:"#f0f7ff",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px"}},"❓"),
                  e('span',{style:{fontSize:"9px",color:MUTED,fontWeight:"700"}},name)
                ))
              )
            ),
            e('div',{style:card},
              e('span',{style:lbl},"タイプカバレッジ"),
              e('div',{style:{display:"flex",flexWrap:"wrap",gap:"2px",marginTop:"4px"}},
                analysis.coverage.length?analysis.coverage.map(t=>e(TypeBadge,{key:t,type:t})):e('span',{style:{fontSize:"12px",color:MUTED}},"データなし")
              )
            ),
            analysis.quads.length>0&&e('div',{style:{background:"#fff5f5",border:"2px solid rgba(200,50,50,0.3)",borderRadius:"12px",padding:"12px",borderLeft:"4px solid #c03030"}},
              e('div',{style:{fontSize:"13px",fontWeight:"900",color:"#c03030",marginBottom:"8px"}},"⚠️ 4倍弱点あり！"),
              ...analysis.quads.map(([t,names])=>e('div',{key:t,style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px",fontSize:"12px",color:"#8b1a1a",fontWeight:"700"}},
                e(TypeBadge,{type:t,small:true}),e('span',null,"→ "+names.join("、"))
              ))
            ),
            e('div',{style:card},
              e('span',{style:lbl},"弱点まとめ（多い順）"),
              e('div',{style:{display:"flex",flexWrap:"wrap",gap:"5px",marginTop:"6px"}},
                analysis.sorted.length===0?e('span',{style:{fontSize:"12px",color:MUTED,fontWeight:"700"}},"大きな弱点なし 🎉"):
                analysis.sorted.map(([t,c])=>{
                  const isQ=analysis.quads.some(([qt])=>qt===t);
                  return e('span',{key:t,style:{background:isQ?"rgba(200,50,50,0.1)":c>=3?"rgba(230,120,30,0.1)":"#f0f7ff",border:`2px solid ${isQ?"rgba(200,50,50,0.3)":c>=3?"rgba(230,120,30,0.3)":"#d4e8f5"}`,borderRadius:"8px",padding:"4px 8px",fontSize:"12px",fontWeight:"700",color:isQ?"#c03030":c>=3?"#b06020":"#6b8fa8"}},t," ",e('span',{style:{opacity:0.7}},c+"体"));
                })
              )
            ),
            analysis.unknown.length>0&&e('div',{style:{fontSize:"11px",color:MUTED,fontWeight:"600",textAlign:"center"}},"タイプ未取得: "+analysis.unknown.join("、"))
          )
        ),

        // ── SAVED ──
        tab==="saved"&&e('div',{style:{display:"flex",flexDirection:"column",gap:"12px"}},
          e('div',{style:card},
            e('span',{style:lbl},"バックアップ"),
            e('div',{style:{display:"flex",gap:"8px",marginTop:"6px"}},
              e('button',{style:{...btn(),flex:1,fontSize:"12px"},onClick:exportData},"📤 エクスポート"),
              e('button',{style:{...btn(),flex:1,fontSize:"12px"},onClick:()=>fileRef.current.click()},"📥 インポート"),
              e('input',{ref:fileRef,type:"file",accept:".json",style:{display:"none"},onChange:ev=>{if(ev.target.files[0]){importData(ev.target.files[0]);ev.target.value="";}}})
            )
          ),
          e('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
            e('div',null,e('span',{style:lbl},"作品で絞り込み"),e('select',{style:{...inp,appearance:"none",fontSize:"12px"},value:filterGame,onChange:ev=>setFilterGame(ev.target.value)},e('option',{value:""},"すべて"),...GAMES.map(g=>e('option',{key:g,value:g},g)))),
            e('div',null,e('span',{style:lbl},"検索"),e('input',{style:{...inp,fontSize:"12px"},value:searchKw,onChange:ev=>setSearchKw(ev.target.value),placeholder:"名前・タグ・メンバー"}))
          ),
          status&&e('div',{style:{background:"rgba(90,181,82,0.12)",border:"2px solid rgba(90,181,82,0.3)",borderRadius:"10px",padding:"8px 12px",fontSize:"12px",color:"#2a7a20",textAlign:"center",fontWeight:"700"}},status),
          filtered.length===0?e('div',{style:{...card,textAlign:"center",color:MUTED,padding:"30px",fontSize:"14px"}},"パーティがありません"):
          filtered.map(p=>e('div',{key:p.id,style:{...card,borderColor:editId===p.id?"rgba(227,53,13,0.3)":"rgba(255,255,255,0.95)",animation:"fadeIn 0.2s"}},
            e('div',{style:{fontWeight:"800",fontSize:"14px",marginBottom:"3px",color:TEXT}},p.name||"無名パーティ"),
            e('div',{style:{fontSize:"11px",color:MUTED,marginBottom:"6px",fontWeight:"700"}},p.game||"未設定"),
            e('div',{style:{fontSize:"12px",color:TEXT,marginBottom:"6px",fontWeight:"600"}},(p.members||[]).join(" / ")||"メンバー未入力"),
            p.tags?.length>0&&e('div',{style:{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"6px"}},...p.tags.map(t=>e('span',{key:t,style:{background:"rgba(91,184,245,0.1)",border:"1px solid rgba(91,184,245,0.3)",borderRadius:"6px",padding:"2px 7px",fontSize:"10px",color:SKY,fontWeight:"700"}},t))),
            p.notes&&e('div',{style:{fontSize:"11px",color:MUTED,whiteSpace:"pre-wrap",marginBottom:"8px",fontWeight:"600"}},p.notes.slice(0,80)+(p.notes.length>80?"…":"")),
            e('div',{style:{display:"flex",gap:"8px"}},
              e('button',{style:{...btn("p"),flex:1,fontSize:"12px",padding:"7px"},onClick:()=>loadParty(p)},"✏️ 編集"),
              e('button',{style:{...btn("r"),fontSize:"12px",padding:"7px 12px"},onClick:()=>deleteParty(p.id,p.name)},"削除")
            )
          ))
        ),

        // ── CHAT ──
        tab==="chat"&&e('div',{style:{display:"flex",flexDirection:"column",gap:"4px"}},
          // APIキー状態バー
          e('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.85)",borderRadius:"12px",padding:"8px 12px",marginBottom:"4px",border:"2px solid rgba(255,255,255,0.95)"}},
            e('div',{style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"12px",fontWeight:"700"}},
              e('span',{style:{width:"8px",height:"8px",borderRadius:"50%",background:apiKey?"#5ab552":"#e3350d",display:"inline-block",boxShadow:apiKey?"0 0 6px rgba(90,181,82,0.6)":"0 0 6px rgba(227,53,13,0.6)"}}),
              e('span',{style:{color:apiKey?"#1e6b18":"#c03030"}},apiKey?"APIキー設定済み ✓":"APIキー未設定")
            ),
            e('button',{
              onClick:()=>{setShowKeyModal(true);setKeyInput(apiKey);},
              style:{fontSize:"11px",fontWeight:"700",padding:"4px 10px",borderRadius:"8px",border:`2px solid ${apiKey?"#d4e8f5":"rgba(227,53,13,0.3)"}`,background:apiKey?"#f0f7ff":"rgba(227,53,13,0.06)",color:apiKey?MUTED:RED,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}
            },apiKey?"変更":"🔑 設定する")
          ),
          ...msgs.map((m,i)=>e(Msg,{key:i,msg:m})),
          chatLoading&&e('div',{style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 0"}},
            e('div',{style:{width:"28px",height:"28px",borderRadius:"50%",background:"linear-gradient(135deg,#e3350d,#c0280a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",boxShadow:"0 2px 8px rgba(180,30,0,0.3)"}},"🤖"),
            e('div',{style:{display:"flex",gap:"4px"}},...[0,1,2].map(i=>e('div',{key:i,style:{width:"7px",height:"7px",borderRadius:"50%",background:RED,animation:`bounce 1s ease-in-out ${i*0.15}s infinite`}})))
          ),
          e('div',{ref:chatEndRef})
        ),

        // ── APIキー入力モーダル ──
        showKeyModal&&e('div',{style:{position:"fixed",inset:0,background:"rgba(91,184,245,0.2)",backdropFilter:"blur(10px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",maxWidth:"430px",margin:"0 auto"}},
          e('div',{style:{background:"rgba(255,255,255,0.98)",borderRadius:"20px",padding:"24px",width:"100%",boxShadow:"0 8px 40px rgba(50,120,180,0.2)",border:"2px solid rgba(255,255,255,0.95)"}},
            e('div',{style:{fontWeight:"900",fontSize:"16px",color:TEXT,marginBottom:"6px"}},"🔑 Gemini APIキーの設定"),
            e('div',{style:{fontSize:"12px",color:MUTED,marginBottom:"16px",lineHeight:"1.6",fontWeight:"600"}},
              "Google AI Studio（aistudio.google.com）で\n取得した無料のAPIキーを入力してください。\nキーはこの端末のブラウザにのみ保存されます。"
            ),
            e('input',{
              value:keyInput,
              onChange:ev=>setKeyInput(ev.target.value),
              placeholder:"AIzaSy-xxxxxxxxxx...",
              autoFocus:true,
              style:{...inp,fontSize:"13px",fontFamily:"monospace",marginBottom:"12px",letterSpacing:"0.5px"}
            }),
            e('div',{style:{display:"flex",gap:"8px",marginBottom:apiKey?"10px":"0"}},
              e('button',{onClick:saveApiKey,style:{...btn("p"),flex:1}},"💾 保存"),
              e('button',{onClick:()=>{setShowKeyModal(false);setKeyInput("");},style:btn()},"キャンセル")
            ),
            apiKey&&e('button',{
              onClick:()=>{clearApiKey();setShowKeyModal(false);},
              style:{...btn("r"),width:"100%",fontSize:"12px",marginTop:"4px"}
            },"🗑️ 保存済みキーを削除する")
          )
        )
      ),

      // Chat input (fixed bottom)
      tab==="chat"&&e('div',{style:{padding:"12px 14px",background:"rgba(255,255,255,0.92)",backdropFilter:"blur(20px)",borderTop:"2px solid rgba(255,255,255,0.95)",display:"flex",gap:"8px",position:"sticky",bottom:0,boxShadow:"0 -4px 16px rgba(50,120,180,0.1)"}},
        e('input',{value:chatIn,onChange:ev=>setChatIn(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&!ev.shiftKey&&sendChat(),placeholder:apiKey?"構築について質問する...":"先にAPIキーを設定してください",style:{flex:1,...inp,borderRadius:"12px"}}),
        e('button',{onClick:apiKey?sendChat:()=>setShowKeyModal(true),disabled:chatLoading||(apiKey&&!chatIn.trim()),style:{background:apiKey?"linear-gradient(135deg,#e3350d,#c0280a)":"linear-gradient(135deg,#e3350d,#c0280a)",border:"none",borderRadius:"12px",width:"44px",height:"44px",cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center",opacity:chatLoading||(apiKey&&!chatIn.trim())?0.4:1,boxShadow:"0 3px 10px rgba(180,30,0,0.3)"}},apiKey?"↑":"🔑")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
