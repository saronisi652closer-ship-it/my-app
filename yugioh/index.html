<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>遊戯王メニュー</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111827;
      color: #fff;
    }
    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #93c5fd;
      text-decoration: none;
    }
    .menu {
      display: grid;
      gap: 14px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: #fff;
      background: #1f2937;
      border-radius: 16px;
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .card p {
      margin: 0;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">← ホームへ戻る</a>
    <h1>遊戯王</h1>

    <div class="menu">
      <a class="card" href="./card-search/">
        <h2>カード検索</h2>
        <p>カード名・属性・種族・攻守などを確認</p>
      </a>

      <a class="card" href="./deck-manager/">
        <h2>デッキ管理</h2>
        <p>デッキの保存・編集・確認</p>
      </a>

      <a clascard" href="./deck-builder/">
  <h2>デッキビルダー</h2>
  <div class="small">カードを追加してデッキを組む</div>
      </a>
    </div>
  </div>
</body>
</html>
