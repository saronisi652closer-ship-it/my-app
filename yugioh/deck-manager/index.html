<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>遊戯王デッキ管理</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111827;
      color: #fff;
      padding: 24px 16px 48px;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
    .box {
      margin-top: 18px;
      background: #1f2937;
      border-radius: 16px;
      padding: 20px;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      margin-top: 10px;
      resize: vertical;
    }
    .note {
      color: #d1d5db;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="../">← 遊戯王メニューへ戻る</a></p>
    <h1>遊戯王デッキ管理</h1>

    <div class="box">
      <label for="deck">デッキメモ（仮）</label>
      <textarea id="deck" placeholder="カード名を1行ずつ書くなど、あとから管理機能を足せます"></textarea>
      <p class="note">まずはデッキページの土台です。保存機能や分類機能は後で追加できます。</p>
    </div>
  </div>
</body>
</html>
