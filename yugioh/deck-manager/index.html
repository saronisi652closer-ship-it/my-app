<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>遊戯王デッキ管理</title>
<link rel="stylesheet" href="../../style.css">
</head>

<body>

<header>
<div class="wrap">
<h1>遊戯王デッキ管理</h1>
<div class="small">デッキ保存・所持カード管理・不足カード確認</div>
</div>
</header>

<main class="wrap">

<a class="back" href="../">← 遊戯王へ戻る</a>

<div class="grid">

<section class="card">
<h2 id="editorTitle">新規登録</h2>

<div class="two">
<div>
<div class="label">分類</div>
<select id="deckFormat">
<option value="">未設定</option>
<option value="OCG">OCG</option>
<option value="MD">MD</option>
<option value="LOTD">LOTD</option>
<option value="その他">その他</option>
</select>
</div>

<div>
<div class="label">デッキ名</div>
<input id="deckName">
</div>
</div>

<div style="margin-top:10px">
<div class="label">メインデッキ</div>
<textarea id="deckMain"></textarea>
</div>

<div style="margin-top:10px">
<div class="label">エクストラデッキ</div>
<textarea id="deckExtra"></textarea>
</div>

<div style="margin-top:10px">
<div class="label">サイドデッキ</div>
<textarea id="deckSide"></textarea>
</div>

<div class="row" style="margin-top:12px">
<button class="primary" id="saveBtn">保存</button>
<button id="clearBtn">入力クリア</button>
<button class="danger" id="deleteBtn" style="display:none">削除</button>
</div>

<div class="small" id="status"></div>

</section>

<section class="card">

<h2>所持カード管理</h2>

<div class="two">
<div>
<div class="label">カード名</div>
<input id="ownedName">
</div>

<div>
<div class="label">枚数</div>
<input id="ownedCount" type="number">
</div>
</div>

<div class="row" style="margin-top:12px">
<button class="primary" id="saveOwnedBtn">追加 / 更新</button>
</div>

<div style="margin-top:12px">

<div class="label">所持カード一覧</div>

<div id="ownedList"></div>
<div id="ownedEmpty" class="small">まだ所持カードがありません</div>

</div>

<div class="card" style="margin-top:12px">

<h2>不足カード確認</h2>

<select id="missingDeckSelect"></select>

<div class="row" style="margin-top:12px">
<button class="primary" id="checkMissingBtn">不足カード確認</button>
</div>

<div id="missingList"></div>
<div id="missingEmpty" class="small">不足カードはありません</div>

</div>

<div class="card" style="margin-top:12px">

<h2>保存済みデッキ</h2>

<div id="deckList"></div>
<div id="emptyMessage" class="small">まだデッキがありません</div>

</div>

</section>

</div>

</main>

<script>

const STORAGE_KEY="yugioh_deck_manager_v1"
const OWNED_KEY="yugioh_owned_cards_v1"
const CARD_DB_KEY="yugioh_local_card_db_v1"

const $=(id)=>document.getElementById(id)

const deckName=$("deckName")
const deckMain=$("deckMain")
const deckExtra=$("deckExtra")
const deckSide=$("deckSide")

const ownedName=$("ownedName")
const ownedCount=$("ownedCount")

const ownedList=$("ownedList")
const ownedEmpty=$("ownedEmpty")

const deckList=$("deckList")
const emptyMessage=$("emptyMessage")

const missingDeckSelect=$("missingDeckSelect")
const missingList=$("missingList")
const missingEmpty=$("missingEmpty")

let decks=loadDecks()
let ownedCards=loadOwnedCards()

function loadDecks(){
try{
return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")
}catch{return[]}
}

function saveDecks(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(decks))
}

function loadOwnedCards(){
try{
return JSON.parse(localStorage.getItem(OWNED_KEY)||"[]")
}catch{return[]}
}

function saveOwnedCards(){
localStorage.setItem(OWNED_KEY,JSON.stringify(ownedCards))
}

function loadCardDB(){
try{
return JSON.parse(localStorage.getItem(CARD_DB_KEY)||"[]")
}catch{return[]}
}

function findCardImage(name){

const db=loadCardDB()

const hit=db.find(c=>
c.nameJa===name||
c.nameEn===name||
(c.aliases||[]).includes(name)
)

return hit?.image||""
}

function createId(){
return Date.now()+Math.random().toString(36).slice(2)
}

function parseDeck(text){

if(!text)return[]

return text.split("\n").map(line=>{

const parts=line.split(" x")

return{
name:parts[0].trim(),
count:Number(parts[1]||1)
}

})

}

function saveDeck(){

if(!deckName.value.trim())return

const deck={
id:createId(),
name:deckName.value,
main:deckMain.value,
extra:deckExtra.value,
side:deckSide.value
}

decks.unshift(deck)

saveDecks()

renderDeckList()
renderDeckOptions()

}

function saveOwned(){

const name=ownedName.value.trim()
const count=Number(ownedCount.value||1)

if(!name)return

const existing=ownedCards.find(c=>c.name===name)

if(existing){
existing.count=count
}else{
ownedCards.push({id:createId(),name,count})
}

saveOwnedCards()
renderOwnedList()

}

function renderOwnedList(){

ownedList.innerHTML=""

ownedEmpty.style.display=ownedCards.length?"none":"block"

ownedCards.forEach(card=>{

const img=findCardImage(card.name)

const div=document.createElement("div")

div.className="menu-card"

div.innerHTML=`
<div style="display:grid;grid-template-columns:64px 1fr;gap:12px">

<img src="${img}" style="width:64px;height:90px;object-fit:cover;border-radius:6px">

<div>
<h2>${card.name}</h2>
<div class="small">所持:${card.count}</div>
</div>

</div>
`

ownedList.appendChild(div)

})

}

function renderDeckOptions(){

missingDeckSelect.innerHTML=
`<option value="">デッキ選択</option>`+
decks.map(d=>`<option value="${d.id}">${d.name}</option>`).join("")

}

function renderDeckList(){

deckList.innerHTML=""

emptyMessage.style.display=decks.length?"none":"block"

decks.forEach(deck=>{

const first=parseDeck(deck.main)[0]

const img=first?findCardImage(first.name):""

const card=document.createElement("div")

card.className="menu-card"

card.innerHTML=`

<div style="display:grid;grid-template-columns:64px 1fr;gap:12px">

<img src="${img}" style="width:64px;height:90px;object-fit:cover;border-radius:6px">

<div>
<h2>${deck.name}</h2>
</div>

</div>
`

deckList.appendChild(card)

})

}

function renderMissingCards(){

const id=missingDeckSelect.value

missingList.innerHTML=""

if(!id)return

const deck=decks.find(d=>d.id===id)

if(!deck)return

const cards=[
...parseDeck(deck.main),
...parseDeck(deck.extra),
...parseDeck(deck.side)
]

cards.forEach(card=>{

const owned=ownedCards.find(c=>c.name===card.name)?.count||0

if(owned>=card.count)return

const img=findCardImage(card.name)

const div=document.createElement("div")

div.className="menu-card"

div.innerHTML=`

<div style="display:grid;grid-template-columns:64px 1fr;gap:12px">

<img src="${img}" style="width:64px;height:90px;object-fit:cover;border-radius:6px">

<div>
<h2>${card.name}</h2>
<div class="small">必要:${card.count}</div>
<div class="small">所持:${owned}</div>
<div class="small">不足:${card.count-owned}</div>

<button data-add="${card.name}">所持に追加</button>

</div>

</div>
`

div.querySelector("button").onclick=()=>{

const exist=ownedCards.find(c=>c.name===card.name)

if(exist){
exist.count++
}else{
ownedCards.push({id:createId(),name:card.name,count:1})
}

saveOwnedCards()
renderOwnedList()
renderMissingCards()

}

missingList.appendChild(div)

})

}

$("saveBtn").onclick=saveDeck
$("saveOwnedBtn").onclick=saveOwned
$("checkMissingBtn").onclick=renderMissingCards

renderOwnedList()
renderDeckList()
renderDeckOptions()

</script>

</body>
</html>
