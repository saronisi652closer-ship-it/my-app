<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>遊戯王デッキビルダー</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .count-box{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:12px;
    }
    .count-card{
      background:#10131b;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      text-align:center;
    }
    .count-card.warn{
      border-color:#fb7185;
      box-shadow:0 0 0 1px rgba(251,113,133,.25) inset;
    }
    .count-num{
      font-size:22px;
      font-weight:700;
      margin-top:4px;
    }
    .deck-section{
      margin-top:16px;
    }
    .deck-item{
      background:#10131b;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-top:10px;
    }
    .deck-item h3{
      margin:0 0 8px;
      font-size:16px;
    }
    .deck-head{
      display:grid;
      grid-template-columns:90px 1fr;
      gap:12px;
      align-items:start;
    }
    .deck-head img{
      width:100%;
      max-width:90px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#0f1117;
    }
    .output-box{
      white-space:pre-wrap;
      min-height:180px;
    }
    .warn-text{
      color:#fda4af;
      margin-top:10px;
    }
    @media (max-width:700px){
      .count-box{grid-template-columns:1fr}
      .deck-head{grid-template-columns:1fr}
      .deck-head img{max-width:140px}
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>遊戯王デッキビルダー</h1>
      <div class="small">カードを追加してデッキ構築</div>
    </div>
  </header>

  <main class="wrap">
    <a class="back" href="../">← 遊戯王へ戻る</a>

    <div class="grid">
      <section class="card">
        <h2>カード追加</h2>

        <div class="two">
          <div>
            <div class="label">カード名</div>
            <input id="cardName" type="text" placeholder="例：灰流うらら">
          </div>
          <div>
            <div class="label">入れる場所</div>
            <select id="cardZone">
              <option value="main">メイン</option>
              <option value="extra">エクストラ</option>
              <option value="side">サイド</option>
            </select>
          </div>
        </div>

        <div class="two" style="margin-top:10px;">
          <div>
            <div class="label">枚数</div>
            <input id="cardCount" type="number" min="1" max="3" value="1">
          </div>
          <div>
            <div class="label">画像URL（任意）</div>
            <input id="cardImage" type="text" placeholder="カード検索から追加時は自動">
          </div>
        </div>

        <div style="margin-top:10px;">
          <div class="label">メモ（任意）</div>
          <input id="cardMemo" type="text" placeholder="例：初動 / 誘発 / EX枠">
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="primary" id="addBtn" type="button">追加</button>
          <button id="clearInputBtn" type="button">入力クリア</button>
          <button class="danger" id="clearDeckBtn" type="button">デッキ全削除</button>
        </div>

        <div class="small" id="status" style="margin-top:10px;"></div>

        <div class="count-box">
          <div class="count-card" id="mainCountCard">
            <div class="small">メイン</div>
            <div class="count-num" id="mainCount">0 / 40</div>
          </div>
          <div class="count-card" id="extraCountCard">
            <div class="small">エクストラ</div>
            <div class="count-num" id="extraCount">0 / 15</div>
          </div>
          <div class="count-card" id="sideCountCard">
            <div class="small">サイド</div>
            <div class="count-num" id="sideCount">0 / 15</div>
          </div>
        </div>

        <div class="warn-text" id="deckWarn"></div>
      </section>

      <section class="card">
        <h2>出力</h2>

        <div class="row">
          <button class="primary" id="buildTextBtn" type="button">テキスト出力</button>
          <button id="copyBtn" type="button">コピー</button>
        </div>

        <div class="label" style="margin-top:12px;">deck-manager に貼れる形式</div>
        <div id="outputBox" class="output-box card"></div>
      </section>
    </div>

    <div class="deck-section">
      <section class="card">
        <h2>メインデッキ</h2>
        <div id="mainList"></div>
      </section>

      <section class="card" style="margin-top:14px;">
        <h2>エクストラデッキ</h2>
        <div id="extraList"></div>
      </section>

      <section class="card" style="margin-top:14px;">
        <h2>サイドデッキ</h2>
        <div id="sideList"></div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = "yugioh_deck_builder_v1";
      const $ = (id) => document.getElementById(id);

      const cardName = $("cardName");
      const cardZone = $("cardZone");
      const cardCount = $("cardCount");
      const cardImage = $("cardImage");
      const cardMemo = $("cardMemo");

      const addBtn = $("addBtn");
      const clearInputBtn = $("clearInputBtn");
      const clearDeckBtn = $("clearDeckBtn");
      const buildTextBtn = $("buildTextBtn");
      const copyBtn = $("copyBtn");

      const status = $("status");
      const mainCount = $("mainCount");
      const extraCount = $("extraCount");
      const sideCount = $("sideCount");
      const mainCountCard = $("mainCountCard");
      const extraCountCard = $("extraCountCard");
      const sideCountCard = $("sideCountCard");
      const deckWarn = $("deckWarn");

      const mainList = $("mainList");
      const extraList = $("extraList");
      const sideList = $("sideList");
      const outputBox = $("outputBox");

      let deck = loadDeck();

      function loadDeck() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : { main: [], extra: [], side: [] };
        } catch (e) {
          return { main: [], extra: [], side: [] };
        }
      }

      function saveDeck() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(deck));
      }

      function setStatus(message) {
        status.textContent = message;
        if (message) {
          setTimeout(() => {
            if (status.textContent === message) status.textContent = "";
          }, 2500);
        }
      }

      function createId() {
        return "card_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      }

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getZoneLabel(zone) {
        if (zone === "main") return "メイン";
        if (zone === "extra") return "エクストラ";
        if (zone === "side") return "サイド";
        return zone;
      }

      function clearInputs() {
        cardName.value = "";
        cardZone.value = "main";
        cardCount.value = 1;
        cardImage.value = "";
        cardMemo.value = "";
      }

      function totalCount(zoneItems) {
        return zoneItems.reduce((sum, item) => sum + Number(item.count || 0), 0);
      }

      function renderCounts() {
        const mainTotal = totalCount(deck.main);
        const extraTotal = totalCount(deck.extra);
        const sideTotal = totalCount(deck.side);

        mainCount.textContent = `${mainTotal} / 40`;
        extraCount.textContent = `${extraTotal} / 15`;
        sideCount.textContent = `${sideTotal} / 15`;

        mainCountCard.classList.toggle("warn", mainTotal > 40 || (mainTotal > 0 && mainTotal < 40));
        extraCountCard.classList.toggle("warn", extraTotal > 15);
        sideCountCard.classList.toggle("warn", sideTotal > 15);

        const warns = [];
        if (mainTotal > 40) warns.push(`メインが40枚を超えています（${mainTotal}枚）`);
        if (mainTotal > 0 && mainTotal < 40) warns.push(`メインが40枚未満です（${mainTotal}枚）`);
        if (extraTotal > 15) warns.push(`エクストラが15枚を超えています（${extraTotal}枚）`);
        if (sideTotal > 15) warns.push(`サイドが15枚を超えています（${sideTotal}枚）`);

        deckWarn.textContent = warns.join(" / ");
      }

      function addCard() {
        const name = cardName.value.trim();
        const zone = cardZone.value;
        const count = Number(cardCount.value || 1);
        const image = cardImage.value.trim();
        const memo = cardMemo.value.trim();

        if (!name) {
          setStatus("カード名を入れてください");
          return;
        }

        if (count <= 0) {
          setStatus("枚数は1以上にしてください");
          return;
        }

        const existing = deck[zone].find(item => item.name === name);
        if (existing) {
          existing.count += count;
          if (memo) existing.memo = memo;
          if (image) existing.image = image;
        } else {
          deck[zone].push({
            id: createId(),
            name,
            count,
            image,
            memo
          });
        }

        saveDeck();
        renderAll();
        clearInputs();
        setStatus(`${getZoneLabel(zone)}に追加しました`);
      }

      function updateCard(zone, id, newCount, newMemo) {
        const target = deck[zone].find(item => item.id === id);
        if (!target) return;

        target.count = Math.max(1, Number(newCount || 1));
        target.memo = newMemo.trim();

        saveDeck();
        renderAll();
      }

      function removeCard(zone, id) {
        deck[zone] = deck[zone].filter(item => item.id !== id);
        saveDeck();
        renderAll();
      }

      function renderZone(zone, container) {
        container.innerHTML = "";

        if (!deck[zone].length) {
          container.innerHTML = `<div class="small">まだカードがありません。</div>`;
          return;
        }

        deck[zone].forEach(item => {
          const div = document.createElement("div");
          div.className = "deck-item";

          const imageHtml = item.image
            ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}">`
            : `<div style="width:90px;height:126px;border:1px solid var(--line);border-radius:8px;background:#0f1117;"></div>`;

          div.innerHTML = `
            <div class="deck-head">
              <div>${imageHtml}</div>
              <div>
                <h3>${escapeHtml(item.name)}</h3>
                <div class="two">
                  <div>
                    <div class="label">枚数</div>
                    <input type="number" min="1" max="99" value="${escapeHtml(item.count)}" data-role="count">
                  </div>
                  <div>
                    <div class="label">メモ</div>
                    <input type="text" value="${escapeHtml(item.memo || "")}" data-role="memo">
                  </div>
                </div>
                <div class="row" style="margin-top:12px;">
                  <button type="button" data-role="save">更新</button>
                  <button type="button" class="danger" data-role="delete">削除</button>
                </div>
              </div>
            </div>
          `;

          div.querySelector('[data-role="save"]').addEventListener("click", () => {
            const countInput = div.querySelector('[data-role="count"]');
            const memoInput = div.querySelector('[data-role="memo"]');
            updateCard(zone, item.id, countInput.value, memoInput.value);
            setStatus("更新しました");
          });

          div.querySelector('[data-role="delete"]').addEventListener("click", () => {
            removeCard(zone, item.id);
            setStatus("削除しました");
          });

          container.appendChild(div);
        });
      }

      function buildOutputText() {
        const makeLines = (items) => items.map(item => `${item.name} x${item.count}`).join("\n");

        const mainText = makeLines(deck.main);
        const extraText = makeLines(deck.extra);
        const sideText = makeLines(deck.side);

        outputBox.textContent =
`【メインデッキ】
${mainText || "なし"}

【エクストラデッキ】
${extraText || "なし"}

【サイドデッキ】
${sideText || "なし"}`;
      }

      async function copyOutput() {
        try {
          await navigator.clipboard.writeText(outputBox.textContent || "");
          setStatus("コピーしました");
        } catch (e) {
          setStatus("コピーできませんでした");
        }
      }

      function clearDeck() {
        if (!confirm("デッキを全削除しますか？")) return;
        deck = { main: [], extra: [], side: [] };
        saveDeck();
        renderAll();
        setStatus("デッキを全削除しました");
      }

      function renderAll() {
        renderCounts();
        renderZone("main", mainList);
        renderZone("extra", extraList);
        renderZone("side", sideList);
        buildOutputText();
      }

      addBtn.addEventListener("click", addCard);
      clearInputBtn.addEventListener("click", clearInputs);
      clearDeckBtn.addEventListener("click", clearDeck);
      buildTextBtn.addEventListener("click", buildOutputText);
      copyBtn.addEventListener("click", copyOutput);

      cardName.addEventListener("keydown", (e) => {
        if (e.key === "Enter") addCard();
      });

      renderAll();
    })();
  </script>
</body>
</html>
