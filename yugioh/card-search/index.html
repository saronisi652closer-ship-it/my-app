<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>遊戯王カード検索</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 24px 16px 48px;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
    .box {
      margin-top: 18px;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }
    .note {
      color: #cbd5e1;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="../">← 遊戯王メニューへ戻る</a></p>
    <h1>遊戯王カード検索</h1>

    <div class="box">
      <label for="search">カード名検索（仮）</label>
      <input id="search" type="text" placeholder="ここにカード名を入れる">
      <p class="note">今は土台だけです。あとから検索機能やカードデータを追加できます。</p>
    </div>
  </div>
</body>
</html>
