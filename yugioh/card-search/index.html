<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>遊戯王デッキ管理</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <header>
    <div class="wrap">
      <h1>遊戯王デッキ管理</h1>
      <div class="small">デッキ保存・所持カード管理・不足カード確認</div>
    </div>
  </header>

  <main class="wrap">
    <a class="back" href="../">← 遊戯王へ戻る</a>

    <div class="grid">
      <section class="card">
        <h2 id="editorTitle">新規登録</h2>

        <div class="two">
          <div>
            <div class="label">分類</div>
            <select id="deckFormat">
              <option value="">未設定</option>
              <option value="OCG">OCG</option>
              <option value="MD">MD</option>
              <option value="LOTD">LOTD</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div>
            <div class="label">デッキ名</div>
            <input id="deckName" type="text" placeholder="例：獄神 後攻OTK">
          </div>
        </div>

        <div style="margin-top:10px;">
          <div class="label">メインデッキ</div>
          <textarea id="deckMain" placeholder="例：
灰流うらら x3
増殖するG x2
青眼の白龍 x1"></textarea>
        </div>

        <div style="margin-top:10px;">
          <div class="label">エクストラデッキ</div>
          <textarea id="deckExtra" placeholder="例：
アクセスコード・トーカー x1"></textarea>
        </div>

        <div style="margin-top:10px;">
          <div class="label">サイドデッキ</div>
          <textarea id="deckSide" placeholder="例：
原始生命態ニビル x2"></textarea>
        </div>

        <div style="margin-top:10px;">
          <div class="label">タグ（カンマ区切り）</div>
          <input id="deckTags" type="text" placeholder="例：後攻, OTK, カジュアル">
        </div>

        <div style="margin-top:10px;">
          <div class="label">メモ</div>
          <textarea id="deckNotes" placeholder="回し方、採用理由、候補カードなど"></textarea>
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="primary" id="saveBtn" type="button">保存</button>
          <button id="clearBtn" type="button">入力クリア</button>
          <button class="danger" id="deleteBtn" type="button" style="display:none;">削除</button>
        </div>

        <div class="small" id="status" style="margin-top:10px;"></div>
      </section>

      <section class="card">
        <h2>所持カード管理</h2>

        <div class="two">
          <div>
            <div class="label">カード名</div>
            <input id="ownedName" type="text" placeholder="例：灰流うらら">
          </div>
          <div>
            <div class="label">所持枚数</div>
            <input id="ownedCount" type="number" min="0" max="99" placeholder="例：2">
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="primary" id="saveOwnedBtn" type="button">追加 / 更新</button>
          <button id="clearOwnedBtn" type="button">クリア</button>
        </div>

        <div style="margin-top:12px;">
          <div class="label">所持カード一覧</div>
          <div id="ownedList" class="menu"></div>
          <div id="ownedEmpty" class="small">まだ所持カードがありません。</div>
        </div>

        <div class="card" style="margin-top:12px;">
          <h2>不足カード確認</h2>

          <div class="label">対象デッキ</div>
          <select id="missingDeckSelect"></select>

          <div class="row" style="margin-top:12px;">
            <button class="primary" id="checkMissingBtn" type="button">不足カードを確認</button>
          </div>

          <div style="margin-top:12px;">
            <div class="label">不足カード一覧</div>
            <div id="missingList" class="menu"></div>
            <div id="missingEmpty" class="small">不足カードはまだありません。</div>
          </div>
        </div>

        <div class="card" style="margin-top:12px;">
          <h2>保存済みデッキ一覧</h2>

          <div class="two" style="margin-bottom:12px;">
            <div>
              <div class="label">分類で絞り込み</div>
              <select id="filterFormat">
                <option value="">すべて</option>
                <option value="OCG">OCG</option>
                <option value="MD">MD</option>
                <option value="LOTD">LOTD</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <div>
              <div class="label">検索</div>
              <input id="searchBox" type="text" placeholder="デッキ名・カード名・タグ検索">
            </div>
          </div>

          <div id="deckList" class="menu"></div>
          <div id="emptyMessage" class="small">まだデッキがありません。</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = "yugioh_deck_manager_v1";
      const OWNED_KEY = "yugioh_owned_cards_v1";

      const $ = (id) => document.getElementById(id);

      const editorTitle = $("editorTitle");
      const deckFormat = $("deckFormat");
      const deckName = $("deckName");
      const deckMain = $("deckMain");
      const deckExtra = $("deckExtra");
      const deckSide = $("deckSide");
      const deckTags = $("deckTags");
      const deckNotes = $("deckNotes");

      const saveBtn = $("saveBtn");
      const clearBtn = $("clearBtn");
      const deleteBtn = $("deleteBtn");
      const status = $("status");

      const ownedName = $("ownedName");
      const ownedCount = $("ownedCount");
      const saveOwnedBtn = $("saveOwnedBtn");
      const clearOwnedBtn = $("clearOwnedBtn");
      const ownedList = $("ownedList");
      const ownedEmpty = $("ownedEmpty");

      const missingDeckSelect = $("missingDeckSelect");
      const checkMissingBtn = $("checkMissingBtn");
      const missingList = $("missingList");
      const missingEmpty = $("missingEmpty");

      const filterFormat = $("filterFormat");
      const searchBox = $("searchBox");
      const deckList = $("deckList");
      const emptyMessage = $("emptyMessage");

      let decks = loadDecks();
      let ownedCards = loadOwnedCards();
      let editingId = null;

      function loadDecks() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveDecks() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(decks));
      }

      function loadOwnedCards() {
        try {
          const raw = localStorage.getItem(OWNED_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveOwnedCards() {
        localStorage.setItem(OWNED_KEY, JSON.stringify(ownedCards));
      }

      function setStatus(message) {
        status.textContent = message;
        if (message) {
          setTimeout(() => {
            if (status.textContent === message) status.textContent = "";
          }, 2500);
        }
      }

      function createId(prefix = "id") {
        return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function parseTags(text) {
        return text
          .split(",")
          .map(tag => tag.trim())
          .filter(tag => tag);
      }

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function countCards(text) {
        const lines = text.split("\n").map(line => line.trim()).filter(Boolean);
        let total = 0;

        for (const line of lines) {
          const match = line.match(/(?:x|×)?\s*(\d+)$/i);
          if (match) {
            total += Number(match[1]);
          } else {
            total += 1;
          }
        }

        return total;
      }

      function parseDeckLines(text) {
        const lines = text.split("\n").map(line => line.trim()).filter(Boolean);

        return lines.map(line => {
          const match = line.match(/^(.*?)(?:\s*(?:x|×)\s*(\d+)|\s+(\d+))?$/i);
          const name = (match?.[1] || line).trim();
          const count = Number(match?.[2] || match?.[3] || 1);
          return { name, count };
        }).filter(item => item.name);
      }

      function getFormData() {
        return {
          id: editingId || createId("deck"),
          format: deckFormat.value,
          name: deckName.value.trim(),
          main: deckMain.value.trim(),
          extra: deckExtra.value.trim(),
          side: deckSide.value.trim(),
          tags: parseTags(deckTags.value),
          notes: deckNotes.value.trim(),
          updatedAt: new Date().toISOString()
        };
      }

      function clearForm() {
        editingId = null;
        editorTitle.textContent = "新規登録";
        deckFormat.value = "";
        deckName.value = "";
        deckMain.value = "";
        deckExtra.value = "";
        deckSide.value = "";
        deckTags.value = "";
        deckNotes.value = "";
        deleteBtn.style.display = "none";
      }

      function fillForm(deck) {
        editingId = deck.id;
        editorTitle.textContent = "編集中：" + (deck.name || "無名デッキ");
        deckFormat.value = deck.format || "";
        deckName.value = deck.name || "";
        deckMain.value = deck.main || "";
        deckExtra.value = deck.extra || "";
        deckSide.value = deck.side || "";
        deckTags.value = (deck.tags || []).join(", ");
        deckNotes.value = deck.notes || "";
        deleteBtn.style.display = "inline-block";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function saveCurrentDeck() {
        const data = getFormData();

        if (!data.name) {
          setStatus("デッキ名を入れてください");
          return;
        }

        const existingIndex = decks.findIndex(d => d.id === data.id);

        if (existingIndex >= 0) {
          data.createdAt = decks[existingIndex].createdAt || data.updatedAt;
          decks[existingIndex] = data;
          setStatus("更新しました");
        } else {
          data.createdAt = data.updatedAt;
          decks.unshift(data);
          setStatus("保存しました");
        }

        saveDecks();
        renderDeckList();
        renderDeckOptions();
        fillForm(data);
      }

      function deleteCurrentDeck() {
        if (!editingId) return;

        const target = decks.find(d => d.id === editingId);
        if (!target) return;

        const ok = confirm(`「${target.name || "このデッキ"}」を削除しますか？`);
        if (!ok) return;

        decks = decks.filter(d => d.id !== editingId);
        saveDecks();
        clearForm();
        renderDeckList();
        renderDeckOptions();
        renderMissingCards();
        setStatus("削除しました");
      }

      function saveOwnedCard() {
        const name = ownedName.value.trim();
        const count = Number(ownedCount.value || 0);

        if (!name) {
          setStatus("カード名を入れてください");
          return;
        }

        const existingIndex = ownedCards.findIndex(c => c.name === name);

        if (existingIndex >= 0) {
          ownedCards[existingIndex].count = count;
        } else {
          ownedCards.unshift({
            id: createId("owned"),
            name,
            count
          });
        }

        saveOwnedCards();
        renderOwnedList();
        ownedName.value = "";
        ownedCount.value = "";
        setStatus("所持カードを保存しました");
      }

      function renderOwnedList() {
        ownedList.innerHTML = "";
        ownedEmpty.style.display = ownedCards.length ? "none" : "block";

        ownedCards
          .slice()
          .sort((a, b) => a.name.localeCompare(b.name, "ja"))
          .forEach(card => {
            const item = document.createElement("div");
            item.className = "menu-card";
            item.innerHTML = `
              <h2>${escapeHtml(card.name)}</h2>
              <div class="small">所持枚数：${escapeHtml(card.count)}</div>
              <div class="row" style="margin-top:12px;">
                <button type="button" data-action="edit-owned" data-id="${escapeHtml(card.id)}">編集</button>
                <button type="button" class="danger" data-action="delete-owned" data-id="${escapeHtml(card.id)}">削除</button>
              </div>
            `;
            ownedList.appendChild(item);
          });

        ownedList.querySelectorAll("button[data-action='edit-owned']").forEach(btn => {
          btn.addEventListener("click", () => {
            const target = ownedCards.find(c => c.id === btn.dataset.id);
            if (!target) return;
            ownedName.value = target.name;
            ownedCount.value = target.count;
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        });

        ownedList.querySelectorAll("button[data-action='delete-owned']").forEach(btn => {
          btn.addEventListener("click", () => {
            const target = ownedCards.find(c => c.id === btn.dataset.id);
            if (!target) return;
            const ok = confirm(`「${target.name}」を削除しますか？`);
            if (!ok) return;

            ownedCards = ownedCards.filter(c => c.id !== btn.dataset.id);
            saveOwnedCards();
            renderOwnedList();
            renderMissingCards();
            setStatus("所持カードを削除しました");
          });
        });
      }

      function getFilteredDecks() {
        const format = filterFormat.value;
        const keyword = searchBox.value.trim().toLowerCase();

        let result = [...decks];

        if (format) {
          result = result.filter(d => d.format === format);
        }

        if (keyword) {
          result = result.filter(d => {
            const text = [
              d.name,
              d.format,
              d.main,
              d.extra,
              d.side,
              ...(d.tags || []),
              d.notes
            ].join(" ").toLowerCase();

            return text.includes(keyword);
          });
        }

        result.sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
        return result;
      }

      function renderDeckList() {
        const items = getFilteredDecks();
        deckList.innerHTML = "";
        emptyMessage.style.display = items.length ? "none" : "block";

        items.forEach((deck) => {
          const card = document.createElement("div");
          card.className = "menu-card";

          const mainCount = countCards(deck.main || "");
          const extraCount = countCards(deck.extra || "");
          const sideCount = countCards(deck.side || "");

          const tagsHtml = (deck.tags || []).length
            ? `<div class="small" style="margin-top:8px;">タグ：${escapeHtml((deck.tags || []).join(" / "))}</div>`
            : "";

          const notesHtml = deck.notes
            ? `<div class="small" style="margin-top:8px; white-space:pre-wrap;">${escapeHtml(deck.notes)}</div>`
            : "";

          card.innerHTML = `
            <h2>${escapeHtml(deck.name || "無名デッキ")}</h2>
            <div class="small">分類：${escapeHtml(deck.format || "未設定")}</div>
            <div class="small" style="margin-top:6px;">メイン ${mainCount}枚 / エクストラ ${extraCount}枚 / サイド ${sideCount}枚</div>
            ${tagsHtml}
            ${notesHtml}
            <div class="row" style="margin-top:12px;">
              <button type="button" data-action="edit-deck" data-id="${escapeHtml(deck.id)}">編集</button>
              <button type="button" class="danger" data-action="delete-deck" data-id="${escapeHtml(deck.id)}">削除</button>
            </div>
          `;

          deckList.appendChild(card);
        });

        deckList.querySelectorAll("button[data-action='edit-deck']").forEach(btn => {
          btn.addEventListener("click", () => {
            const target = decks.find(d => d.id === btn.dataset.id);
            if (target) fillForm(target);
          });
        });

        deckList.querySelectorAll("button[data-action='delete-deck']").forEach(btn => {
          btn.addEventListener("click", () => {
            const target = decks.find(d => d.id === btn.dataset.id);
            if (!target) return;

            const ok = confirm(`「${target.name || "このデッキ"}」を削除しますか？`);
            if (!ok) return;

            decks = decks.filter(d => d.id !== btn.dataset.id);
            saveDecks();

            if (editingId === btn.dataset.id) clearForm();

            renderDeckList();
            renderDeckOptions();
            renderMissingCards();
            setStatus("削除しました");
          });
        });
      }

      function renderDeckOptions() {
        const currentValue = missingDeckSelect.value;
        missingDeckSelect.innerHTML = `<option value="">デッキを選択</option>` +
          decks.map(deck => `<option value="${escapeHtml(deck.id)}">${escapeHtml(deck.name)}</option>`).join("");

        if (decks.some(deck => deck.id === currentValue)) {
          missingDeckSelect.value = currentValue;
        }
      }

      function aggregateDeckRequirements(deck) {
        const allCards = [
          ...parseDeckLines(deck.main || ""),
          ...parseDeckLines(deck.extra || ""),
          ...parseDeckLines(deck.side || "")
        ];

        const map = new Map();

        allCards.forEach(item => {
          const current = map.get(item.name) || 0;
          map.set(item.name, current + item.count);
        });

        return Array.from(map.entries()).map(([name, required]) => ({ name, required }));
      }

      function renderMissingCards() {
        const deckId = missingDeckSelect.value;
        missingList.innerHTML = "";

        if (!deckId) {
          missingEmpty.style.display = "block";
          missingEmpty.textContent = "デッキを選んでください。";
          return;
        }

        const deck = decks.find(d => d.id === deckId);
        if (!deck) {
          missingEmpty.style.display = "block";
          missingEmpty.textContent = "デッキが見つかりません。";
          return;
        }

        const requirements = aggregateDeckRequirements(deck);
        const missing = requirements
          .map(req => {
            const owned = ownedCards.find(card => card.name === req.name)?.count || 0;
            return {
              name: req.name,
              required: req.required,
              owned,
              missing: Math.max(req.required - owned, 0)
            };
          })
          .filter(item => item.missing > 0)
          .sort((a, b) => b.missing - a.missing || a.name.localeCompare(b.name, "ja"));

        missingEmpty.style.display = missing.length ? "none" : "block";
        missingEmpty.textContent = missing.length ? "" : "不足カードはありません。";

        missing.forEach(item => {
          const card = document.createElement("div");
          card.className = "menu-card";
          card.innerHTML = `
            <h2>${escapeHtml(item.name)}</h2>
            <div class="small">必要枚数：${escapeHtml(item.required)}</div>
            <div class="small">所持枚数：${escapeHtml(item.owned)}</div>
            <div class="small" style="margin-top:6px;">不足枚数：${escapeHtml(item.missing)}</div>
          `;
          missingList.appendChild(card);
        });
      }

      saveBtn.addEventListener("click", saveCurrentDeck);
      clearBtn.addEventListener("click", () => {
        clearForm();
        setStatus("入力をクリアしました");
      });
      deleteBtn.addEventListener("click", deleteCurrentDeck);

      saveOwnedBtn.addEventListener("click", saveOwnedCard);
      clearOwnedBtn.addEventListener("click", () => {
        ownedName.value = "";
        ownedCount.value = "";
      });

      checkMissingBtn.addEventListener("click", renderMissingCards);
      filterFormat.addEventListener("change", renderDeckList);
      searchBox.addEventListener("input", renderDeckList);

      clearForm();
      renderOwnedList();
      renderDeckList();
      renderDeckOptions();
      renderMissingCards();
    })();
  </script>
</body>
</html>
