<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>遊戯王カード検索</title>
<link rel="stylesheet" href="../../style.css">

<style>
.result-card{display:none}
.result-card.show{display:block}

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px
}

@media(min-width:700px){
.info-grid{grid-template-columns:repeat(3,1fr)}
}

.mini-card{
background:#10131b;
border:1px solid var(--line);
border-radius:14px;
padding:10px
}

.loading{color:var(--muted);margin-top:10px}
.error-box{color:#fda4af;margin-top:10px}
.preline{white-space:pre-wrap}

.badge-list{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:8px
}

.badge{
display:inline-block;
padding:6px 10px;
border:1px solid var(--line);
border-radius:999px;
font-size:12px;
background:#0f1117
}

.candidate-list{
display:flex;
flex-direction:column;
gap:10px;
margin-top:12px
}

.candidate-item{
background:#10131b;
border:1px solid var(--line);
border-radius:14px;
padding:12px
}

.card-img{
max-width:220px;
border-radius:10px;
border:1px solid #333;
margin-top:10px
}
</style>
</head>

<body>

<header>
<div class="wrap">
<h1>遊戯王カード検索</h1>
<div class="small">日本語検索対応 + 所持カード + デッキビルダー</div>
</div>
</header>

<main class="wrap">

<a class="back" href="../">← 遊戯王へ戻る</a>

<div class="grid">

<section class="card">

<h2>検索</h2>

<div class="label">カード名</div>

<input id="searchInput" type="text"
placeholder="例：青眼 / ブラックマジシャン / Dark Magician">

<div class="row" style="margin-top:12px;">
<button class="primary" id="searchBtn">検索</button>
<button id="clearBtn">クリア</button>
</div>

<div class="loading" id="loadingText"></div>
<div class="error-box" id="errorText"></div>

<div style="margin-top:12px;">
<div class="label">候補一覧</div>
<div id="candidateList" class="candidate-list"></div>
<div id="candidateEmpty" class="small">候補はまだありません。</div>
</div>

</section>

<section class="card result-card" id="resultCard">

<h2 id="cardTitle">検索結果</h2>

<div style="text-align:center">
<img id="cardImage" class="card-img">
</div>

<div class="badge-list" id="typeBadges"></div>

<div style="margin-top:12px">
<div class="label">基本情報</div>
<div class="info-grid" id="infoGrid"></div>
</div>

<div style="margin-top:12px">
<div class="label">カードテキスト</div>
<div id="cardDesc" class="small preline"></div>
</div>

<div style="margin-top:12px">
<div class="label">収録情報</div>
<div id="setInfo" class="small preline"></div>
</div>

<div class="card" style="margin-top:12px">

<h2>所持カードへ追加</h2>

<div class="two">
<div>
<div class="label">カード名</div>
<input id="ownedName" readonly>
</div>

<div>
<div class="label">追加枚数</div>
<input id="ownedCount" type="number" min="1" value="1">
</div>
</div>

<div class="row" style="margin-top:12px">
<button class="primary" id="addOwnedBtn">所持カードへ追加</button>
</div>

<div class="small" id="ownedStatus"></div>

</div>

<div class="card" style="margin-top:12px">

<h2>デッキビルダーへ追加</h2>

<div class="two">
<div>
<div class="label">入れる場所</div>

<select id="builderZone">
<option value="main">メイン</option>
<option value="extra">エクストラ</option>
<option value="side">サイド</option>
</select>

</div>

<div>
<div class="label">追加枚数</div>
<input id="builderCount" type="number" min="1" value="1">
</div>
</div>

<div class="row" style="margin-top:12px">
<button class="primary" id="addBuilderBtn">デッキビルダーへ追加</button>
</div>

<div class="small" id="builderStatus"></div>

</div>

</section>

</div>
</main>

  "ブラマジ":"Dark Magician",

};

};

const TYPE_JP = {

  "Synchro Monster":"シンクロモンスター",

};

const searchInput = $("searchInput");
const searchBtn = $("searchBtn");
const clearBtn = $("clearBtn");
const loadingText = $("loadingText");
const errorText = $("errorText");

const candidateList = $("candidateList");
const candidateEmpty = $("candidateEmpty");

const resultCard = $("resultCard");
const cardTitle = $("cardTitle");
const cardImage = $("cardImage");
const typeBadges = $("typeBadges");
const infoGrid = $("infoGrid");
const cardDesc = $("cardDesc");
const setInfo = $("setInfo");

const ownedName = $("ownedName");
const ownedCount = $("ownedCount");
const ownedStatus = $("ownedStatus");

const builderZone = $("builderZone");
const builderCount = $("builderCount");
const builderStatus = $("builderStatus");

let currentCard = null;

function createInfo(label, val) {
  return `
    <div class="mini-card">
      <strong>${label}</strong>
      <div>${val ?? "—"}</div>
    </div>
  `;
}

function renderBadges(card) {
  typeBadges.innerHTML = "";

  const type = TYPE_JP[card.type] || card.type;
  const attr = ATTRIBUTE_JP[card.attribute] || card.attribute;
  const race = RACE_JP[card.race] || card.race;

  [type, attr, race].filter(Boolean).forEach(text => {
    const span = document.createElement("span");
    span.className = "badge";
    span.textContent = text;
    typeBadges.appendChild(span);
  });
}

function renderCard(card) {
  currentCard = card;

  cardTitle.textContent = card.name || "";
  cardImage.src = card.card_images?.[0]?.image_url || "";
  renderBadges(card);

  const rows = [
    createInfo("カードID", card.id),
    createInfo("属性", ATTRIBUTE_JP[card.attribute] || card.attribute),
    createInfo("種族", RACE_JP[card.race] || card.race),
    createInfo("レベル", card.level),
    createInfo("攻撃力", card.atk),
    createInfo("守備力", card.def)
  ];

  infoGrid.innerHTML = rows.join("");
  cardDesc.textContent = card.desc || "";

  if (card.card_sets && card.card_sets.length) {
    setInfo.textContent = card.card_sets
      .slice(0, 10)
      .map(s => `${s.set_name} / ${s.set_code} / ${s.set_rarity}`)
      .join("\n");
  } else {
    setInfo.textContent = "収録情報なし";
  }

  ownedName.value = card.name || "";
  ownedCount.value = 1;
  builderZone.value = "main";
  builderCount.value = 1;

  resultCard.classList.add("show");
}

function renderCandidates(cards) {
  candidateList.innerHTML = "";
  candidateEmpty.style.display = cards.length ? "none" : "block";

  cards.forEach(card => {
    const div = document.createElement("div");
    div.className = "candidate-item";

    div.innerHTML = `
      <h2>${card.name}</h2>
      <div class="small">${
        TYPE_JP[card.type] || card.type
      } / ${
        ATTRIBUTE_JP[card.attribute] || card.attribute
      } / ${
        RACE_JP[card.race] || card.race
      }</div>
      <div class="row" style="margin-top:12px">
        <button data-id="${card.id}">詳細表示</button>
      </div>
    `;

    div.querySelector("button").onclick = () => {
      renderCard(card);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    candidateList.appendChild(div);
  });
}

async function searchCard() {
  let keyword = searchInput.value.trim();

  errorText.textContent = "";
  loadingText.textContent = "";
  candidateList.innerHTML = "";
  candidateEmpty.style.display = "block";
  resultCard.classList.remove("show");

  if (JP_TO_EN[keyword]) {
    keyword = JP_TO_EN[keyword];
  }

  if (!keyword) {
    errorText.textContent = "カード名を入れてください";
    return;
  }

  try {
    loadingText.textContent = "検索中...";

    let data = null;

    try {
      const res1 = await fetch(`${API}?fname=${encodeURIComponent(keyword)}`);
      data = await res1.json();
    } catch (e) {}

    if (!data || !data.data) {
      const res2 = await fetch(`${API}?name=${encodeURIComponent(keyword)}`);
      data = await res2.json();
    }

    if (!data || !data.data || !data.data.length) {
      throw new Error("notfound");
    }

    renderCandidates(data.data);
    renderCard(data.data[0]);
    loadingText.textContent = "";
  } catch (e) {
    loadingText.textContent = "";
    errorText.textContent = "カードが見つかりません";
  }
}

searchBtn.onclick = searchCard;

clearBtn.onclick = () => {
  searchInput.value = "";
  loadingText.textContent = "";
  errorText.textContent = "";
  candidateList.innerHTML = "";
  candidateEmpty.style.display = "block";
  resultCard.classList.remove("show");
  cardImage.src = "";
};

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") searchCard();
});
  </script>
