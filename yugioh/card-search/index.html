<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>遊戯王カード検索</title>
<link rel="stylesheet" href="../../style.css">

<style>
.result-card{display:none}
.result-card.show{display:block}

.info-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px
}

@media(min-width:700px){
  .info-grid{grid-template-columns:repeat(3,1fr)}
}

.mini-card{
  background:#10131b;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px
}

.loading{color:var(--muted);margin-top:10px}
.error-box{color:#fda4af;margin-top:10px}
.preline{white-space:pre-wrap}

.badge-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  font-size:12px;
  background:#0f1117
}

.candidate-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:12px
}

.candidate-item{
  background:#10131b;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px
}

.card-img{
  max-width:220px;
  border-radius:10px;
  border:1px solid #333;
  margin-top:10px
}
</style>
</head>

<body>

<header>
  <div class="wrap">
    <h1>遊戯王カード検索</h1>
    <div class="small">日本語検索対応 + 所持カード + デッキビルダー</div>
  </div>
</header>

<main class="wrap">
  <a class="back" href="../">← 遊戯王へ戻る</a>

  <div class="grid">

    <section class="card">
      <h2>検索</h2>

      <div class="label">カード名</div>
      <input id="searchInput" type="text" placeholder="例：青眼 / ブラックマジシャン / Dark Magician">

      <div class="row" style="margin-top:12px;">
        <button class="primary" id="searchBtn" type="button">検索</button>
        <button id="clearBtn" type="button">クリア</button>
      </div>

      <div class="loading" id="loadingText"></div>
      <div class="error-box" id="errorText"></div>

      <div style="margin-top:12px;">
        <div class="label">候補一覧</div>
        <div id="candidateList" class="candidate-list"></div>
        <div id="candidateEmpty" class="small">候補はまだありません。</div>
      </div>
    </section>

    <section class="card result-card" id="resultCard">
      <h2 id="cardTitle">検索結果</h2>

      <div style="text-align:center">
        <img id="cardImage" class="card-img" alt="card image">
      </div>

      <div class="badge-list" id="typeBadges"></div>

      <div style="margin-top:12px">
        <div class="label">基本情報</div>
        <div class="info-grid" id="infoGrid"></div>
      </div>

      <div style="margin-top:12px">
        <div class="label">カードテキスト</div>
        <div id="cardDesc" class="small preline"></div>
      </div>

      <div style="margin-top:12px">
        <div class="label">収録情報</div>
        <div id="setInfo" class="small preline"></div>
      </div>

      <div class="card" style="margin-top:12px">
        <h2>所持カードへ追加</h2>

        <div class="two">
          <div>
            <div class="label">カード名</div>
            <input id="ownedName" readonly>
          </div>

          <div>
            <div class="label">追加枚数</div>
            <input id="ownedCount" type="number" min="1" value="1">
          </div>
        </div>

        <div class="row" style="margin-top:12px">
          <button class="primary" id="addOwnedBtn" type="button">所持カードへ追加</button>
        </div>

        <div class="small" id="ownedStatus"></div>
      </div>

      <div class="card" style="margin-top:12px">
        <h2>デッキビルダーへ追加</h2>

        <div class="two">
          <div>
            <div class="label">入れる場所</div>
            <select id="builderZone">
              <option value="main">メイン</option>
              <option value="extra">エクストラ</option>
              <option value="side">サイド</option>
            </select>
          </div>

          <div>
            <div class="label">追加枚数</div>
            <input id="builderCount" type="number" min="1" value="1">
          </div>
        </div>

        <div class="row" style="margin-top:12px">
          <button class="primary" id="addBuilderBtn" type="button">デッキビルダーへ追加</button>
        </div>

        <div class="small" id="builderStatus"></div>
      </div>
    </section>

  </div>
</main>

<script>
const API = "https://db.ygoprodeck.com/api/v7/cardinfo.php";
const OWNED_KEY = "yugioh_owned_cards_v1";
const BUILDER_KEY = "yugioh_deck_builder_v1";

const JP_TO_EN = {
  "青眼":"Blue-Eyes",
  "ブルーアイズ":"Blue-Eyes",
  "青眼の白龍":"Blue-Eyes White Dragon",
  "ブラックマジシャン":"Dark Magician",
  "ブラマジ":"Dark Magician",
  "ブラック・マジシャン":"Dark Magician",
  "ブラックマジシャンガール":"Dark Magician Girl",
  "ブラック・マジシャン・ガール":"Dark Magician Girl",
  "真紅眼":"Red-Eyes",
  "レッドアイズ":"Red-Eyes",
  "真紅眼の黒竜":"Red-Eyes Black Dragon",
  "うらら":"Ash Blossom & Joyous Spring",
  "灰流うらら":"Ash Blossom & Joyous Spring",
  "増殖するG":"Maxx \"C\"",
  "増G":"Maxx \"C\"",
  "ニビル":"Nibiru, the Primal Being",
  "BF":"Blackwing",
  "ブラックフェザー":"Blackwing",
  "スプライト":"Spright",
  "烙印":"Branded",
  "ティアラメンツ":"Tearlaments"
};

const RACE_JP = {
  "Spellcaster":"魔法使い族",
  "Dragon":"ドラゴン族",
  "Warrior":"戦士族",
  "Beast":"獣族",
  "Beast-Warrior":"獣戦士族",
  "Winged Beast":"鳥獣族",
  "Fiend":"悪魔族",
  "Fairy":"天使族",
  "Zombie":"アンデット族",
  "Machine":"機械族",
  "Aqua":"水族",
  "Pyro":"炎族",
  "Thunder":"雷族",
  "Rock":"岩石族",
  "Plant":"植物族",
  "Insect":"昆虫族",
  "Reptile":"爬虫類族",
  "Fish":"魚族",
  "Sea Serpent":"海竜族",
  "Dinosaur":"恐竜族",
  "Psychic":"サイキック族",
  "Cyberse":"サイバース族"
};

const ATTRIBUTE_JP = {
  "DARK":"闇",
  "LIGHT":"光",
  "EARTH":"地",
  "WATER":"水",
  "FIRE":"炎",
  "WIND":"風",
  "DIVINE":"神"
};

const TYPE_JP = {
  "Normal Monster":"通常モンスター",
  "Effect Monster":"効果モンスター",
  "Fusion Monster":"融合モンスター",
  "Synchro Monster":"シンクロモンスター",
  "XYZ Monster":"エクシーズモンスター",
  "Link Monster":"リンクモンスター",
  "Pendulum Effect Monster":"ペンデュラムモンスター",
  "Spell Card":"魔法カード",
  "Trap Card":"罠カード"
};

const $ = (id) => document.getElementById(id);

const searchInput = $("searchInput");
const searchBtn = $("searchBtn");
const clearBtn = $("clearBtn");
const loadingText = $("loadingText");
const errorText = $("errorText");

const candidateList = $("candidateList");
const candidateEmpty = $("candidateEmpty");

const resultCard = $("resultCard");
const cardTitle = $("cardTitle");
const cardImage = $("cardImage");
const typeBadges = $("typeBadges");
const infoGrid = $("infoGrid");
const cardDesc = $("cardDesc");
const setInfo = $("setInfo");

const ownedName = $("ownedName");
const ownedCount = $("ownedCount");
const addOwnedBtn = $("addOwnedBtn");
const ownedStatus = $("ownedStatus");

const builderZone = $("builderZone");
const builderCount = $("builderCount");
const addBuilderBtn = $("addBuilderBtn");
const builderStatus = $("builderStatus");

let currentCard = null;

function createInfo(label, val) {
  return `
    <div class="mini-card">
      <strong>${label}</strong>
      <div>${val ?? "—"}</div>
    </div>
  `;
}

function createId(prefix = "id") {
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}

function loadOwnedCards() {
  try {
    const raw = localStorage.getItem(OWNED_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveOwnedCards(cards) {
  localStorage.setItem(OWNED_KEY, JSON.stringify(cards));
}

function loadBuilderDeck() {
  try {
    const raw = localStorage.getItem(BUILDER_KEY);
    return raw ? JSON.parse(raw) : { main: [], extra: [], side: [] };
  } catch (e) {
    return { main: [], extra: [], side: [] };
  }
}

function saveBuilderDeck(deck) {
  localStorage.setItem(BUILDER_KEY, JSON.stringify(deck));
}

function setOwnedStatus(message) {
  ownedStatus.textContent = message;
  if (message) {
    setTimeout(() => {
      if (ownedStatus.textContent === message) ownedStatus.textContent = "";
    }, 2500);
  }
}

function setBuilderStatus(message) {
  builderStatus.textContent = message;
  if (message) {
    setTimeout(() => {
      if (builderStatus.textContent === message) builderStatus.textContent = "";
    }, 2500);
  }
}

function renderBadges(card) {
  typeBadges.innerHTML = "";

  const type = TYPE_JP[card.type] || card.type;
  const attr = ATTRIBUTE_JP[card.attribute] || card.attribute;
  const race = RACE_JP[card.race] || card.race;

  [type, attr, race].filter(Boolean).forEach(text => {
    const span = document.createElement("span");
    span.className = "badge";
    span.textContent = text;
    typeBadges.appendChild(span);
  });
}

function renderCard(card) {
  currentCard = card;

  cardTitle.textContent = card.name || "";
  cardImage.src = card.card_images?.[0]?.image_url || "";
  renderBadges(card);

  const rows = [
    createInfo("カードID", card.id),
    createInfo("属性", ATTRIBUTE_JP[card.attribute] || card.attribute),
    createInfo("種族", RACE_JP[card.race] || card.race),
    createInfo("レベル", card.level),
    createInfo("攻撃力", card.atk),
    createInfo("守備力", card.def)
  ];

  infoGrid.innerHTML = rows.join("");
  cardDesc.textContent = card.desc || "";

  if (card.card_sets && card.card_sets.length) {
    setInfo.textContent = card.card_sets
      .slice(0, 10)
      .map(s => `${s.set_name} / ${s.set_code} / ${s.set_rarity}`)
      .join("\n");
  } else {
    setInfo.textContent = "収録情報なし";
  }

  ownedName.value = card.name || "";
  ownedCount.value = 1;
  builderZone.value = "main";
  builderCount.value = 1;

  resultCard.classList.add("show");
}

function renderCandidates(cards) {
  candidateList.innerHTML = "";
  candidateEmpty.style.display = cards.length ? "none" : "block";

  cards.forEach(card => {
    const div = document.createElement("div");
    div.className = "candidate-item";

    div.innerHTML = `
      <h2>${card.name}</h2>
      <div class="small">${
        TYPE_JP[card.type] || card.type
      } / ${
        ATTRIBUTE_JP[card.attribute] || card.attribute
      } / ${
        RACE_JP[card.race] || card.race
      }</div>
      <div class="row" style="margin-top:12px">
        <button type="button">詳細表示</button>
      </div>
    `;

    div.querySelector("button").onclick = () => {
      renderCard(card);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    candidateList.appendChild(div);
  });
}

async function searchCard() {
  let keyword = searchInput.value.trim();

  errorText.textContent = "";
  loadingText.textContent = "";
  candidateList.innerHTML = "";
  candidateEmpty.style.display = "block";
  resultCard.classList.remove("show");
  ownedStatus.textContent = "";
  builderStatus.textContent = "";
  currentCard = null;

  if (JP_TO_EN[keyword]) {
    keyword = JP_TO_EN[keyword];
  }

  if (!keyword) {
    errorText.textContent = "カード名を入れてください";
    return;
  }

  try {
    loadingText.textContent = "検索中...";

    let data = null;

    try {
      const res1 = await fetch(`${API}?fname=${encodeURIComponent(keyword)}`);
      data = await res1.json();
    } catch (e) {}

    if (!data || !data.data) {
      const res2 = await fetch(`${API}?name=${encodeURIComponent(keyword)}`);
      data = await res2.json();
    }

    if (!data || !data.data || !data.data.length) {
      throw new Error("notfound");
    }

    renderCandidates(data.data);
    renderCard(data.data[0]);
    loadingText.textContent = "";
  } catch (e) {
    loadingText.textContent = "";
    errorText.textContent = "カードが見つかりません";
  }
}

function addOwnedCard() {
  if (!currentCard || !ownedName.value.trim()) {
    setOwnedStatus("先にカードを検索してください。");
    return;
  }

  const name = ownedName.value.trim();
  const count = Number(ownedCount.value || 1);

  if (count <= 0) {
    setOwnedStatus("追加枚数は1以上にしてください。");
    return;
  }

  const ownedCards = loadOwnedCards();
  const existing = ownedCards.find(c => c.name === name);

  if (existing) {
    existing.count += count;
  } else {
    ownedCards.unshift({
      id: createId("owned"),
      name,
      count
    });
  }

  saveOwnedCards(ownedCards);
  setOwnedStatus(`「${name}」を ${count} 枚追加しました。`);
}

function addToBuilder() {
  if (!currentCard) {
    setBuilderStatus("先にカードを検索してください。");
    return;
  }

  const name = currentCard.name || "";
  const zone = builderZone.value;
  const count = Number(builderCount.value || 1);
  const image = currentCard.card_images?.[0]?.image_url || "";

  if (!name) {
    setBuilderStatus("カード情報がありません。");
    return;
  }

  if (count <= 0) {
    setBuilderStatus("追加枚数は1以上にしてください。");
    return;
  }

  const deck = loadBuilderDeck();
  if (!deck.main) deck.main = [];
  if (!deck.extra) deck.extra = [];
  if (!deck.side) deck.side = [];

  const targetZone = deck[zone];
  const existing = targetZone.find(item => item.name === name);

  if (existing) {
    existing.count += count;
    if (image) existing.image = image;
  } else {
    targetZone.push({
      id: createId("builder"),
      name,
      count,
      image,
      memo: ""
    });
  }

  saveBuilderDeck(deck);
  setBuilderStatus(`「${name}」を追加しました。`);
}

function clearResult() {
  searchInput.value = "";
  loadingText.textContent = "";
  errorText.textContent = "";
  candidateList.innerHTML = "";
  candidateEmpty.style.display = "block";
  resultCard.classList.remove("show");
  typeBadges.innerHTML = "";
  infoGrid.innerHTML = "";
  cardDesc.textContent = "";
  setInfo.textContent = "";
  cardImage.src = "";
  ownedName.value = "";
  ownedCount.value = 1;
  builderZone.value = "main";
  builderCount.value = 1;
  ownedStatus.textContent = "";
  builderStatus.textContent = "";
  currentCard = null;
}

searchBtn.onclick = searchCard;
clearBtn.onclick = clearResult;
addOwnedBtn.onclick = addOwnedCard;
addBuilderBtn.onclick = addToBuilder;

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") searchCard();
});
</script>

</body>
</html>
